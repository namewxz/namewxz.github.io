<html lang="zh-CN"><head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=0.8">
    <title>智能刷题器</title>
    <!-- Tailwind CSS v3 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Font Awesome -->
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <!-- GSAP 动画库 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <!-- 统一的 Tailwind 配置 -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#3b82f6',
                        secondary: '#60a5fa',
                        success: '#10b981',
                        danger: '#ef4444',
                        warning: '#f59e0b',
                        info: '#3b82f6',
                        light: '#f3f4f6',
                        dark: '#1f2937',
                        'primary-light': '#93c5fd',
                        'success-light': '#6ee7b7',
                        'danger-light': '#fca5a5',
                        'warning-light': '#fcd34d'

                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                    },
                    boxShadow: {
                        'card': '0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06)',
                        'card-hover': '0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05)',
                    }
                }
            }
        }
    </script>
    <style type="text/tailwindcss">
        @layer utilities {
            .content-auto {
                content-visibility: auto;
            }
            .option-hover {
                @apply transition-all duration-300 hover:shadow-md hover:scale-[1.01];
            }
            .btn-primary {
                @apply bg-primary text-white px-4 py-2 rounded-md hover:bg-blue-600 transition-colors duration-300 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-opacity-50;
            }
            .btn-secondary {
                @apply bg-gray-200 text-gray-800 px-4 py-2 rounded-md hover:bg-gray-300 transition-colors duration-300 focus:outline-none focus:ring-2 focus:ring-gray-400 focus:ring-opacity-50;
            }
            .btn-success {
                @apply bg-success text-white px-4 py-2 rounded-md hover:bg-green-600 transition-colors duration-300 focus:outline-none focus:ring-2 focus:ring-green-500 focus:ring-opacity-50;
            }
            .btn-danger {
                @apply bg-danger text-white px-4 py-2 rounded-md hover:bg-red-600 transition-colors duration-300 focus:outline-none focus:ring-2 focus:ring-red-500 focus:ring-opacity-50;
            }
            .tab-active {
                @apply border-b-2 border-primary text-primary;
            }
            .tab-active-dark {
                @apply border-b-2 border-blue-400 text-blue-400;
            }
            .tab-inactive {
                @apply text-gray-500 hover:text-gray-700;
            }
            .tab-inactive-dark {
                @apply text-gray-400 hover:text-gray-300;
            }
            .glass-effect {
                @apply bg-white bg-opacity-80 backdrop-blur-md;
            }
            
            /* 暗黑模式样式 */
            body.bg-gray-900 .btn-primary {
                @apply bg-blue-600 hover:bg-blue-700;
            }
            body.bg-gray-900 .btn-secondary {
                @apply bg-gray-700 text-white hover:bg-gray-600;
            }
            body.bg-gray-900 .btn-success {
                @apply bg-green-700 hover:bg-green-800;
            }
            body.bg-gray-900 .btn-danger {
                @apply bg-red-700 hover:bg-red-800;
            }
        }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">
    <!-- 顶部导航栏 -->
    <header class="bg-white shadow-sm sticky top-0 z-50" id="app-header">
        <div class="container mx-auto px-4 py-3 flex justify-between items-center">
            <div class="flex items-center space-x-2">
                <i class="fa fa-book text-primary text-2xl"></i>
                <h1 class="text-xl font-bold text-gray-800 hidden md:block" id="app-title">智能刷题器</h1>
            </div>
            <div class="flex items-center space-x-2 md:space-x-4">
                <div class="block text-xs sm:text-sm">
                    <span id="question-count" class="text-gray-600">总题数: 0</span>
                    <span id="current-question-index" class="text-gray-600">当前: 0/0</span>
                </div>
                <button id="language-toggle" class="btn-secondary flex items-center px-2 py-1 rounded-md text-sm">
                    <i class="fa fa-globe"></i>
                    <span id="language-text" class="hidden md:inline ml-2">中文</span>
                </button>
                <button id="theme-toggle" class="btn-secondary flex items-center px-2 py-1 rounded-md text-sm">
                    <i class="fa fa-moon-o"></i>
                    <span id="theme-text" class="hidden md:inline ml-2">暗黑模式</span>
                </button>
            </div>
        </div>
        <!-- 功能切换标签 -->
        <div class="container mx-auto px-4 border-b">
            <nav class="flex space-x-4 md:space-x-8 overflow-x-auto">
                <button id="practice-tab" class="py-3 px-1 tab-active font-medium">
                    <span class="block md:hidden">开始</span>
                    <span class="hidden md:block">开始练习</span>
                </button>
                <button id="review-tab" class="py-3 px-1 tab-inactive font-medium">
                    <span class="block md:hidden">重做</span>
                    <span class="hidden md:block">重做练习</span>
                </button>
                <button id="custom-tab" class="py-3 px-1 tab-inactive font-medium">
                    <span class="block md:hidden">导题</span>
                    <span class="hidden md:block">导题练习</span>
                </button>
                <button id="edit-tab" class="py-3 px-1 tab-inactive font-medium">
                    <span class="block md:hidden">编辑</span>
                    <span class="hidden md:block">编辑题目</span>
                </button>
            </nav>
        </div>
    </header>

    <!-- 主内容区 -->
    <main class="container mx-auto px-4 py-6 flex flex-col lg:flex-row gap-6">
        <!-- 左侧操作按钮区域 -->
        <section class="w-full lg:w-1/6">
            <div id="action-buttons" class="bg-white rounded-lg shadow-card p-4 h-full">
                <div class="grid grid-cols-2 md:grid-cols-1 gap-4">
                    <button id="order-toggle" class="btn-secondary flex items-center w-full">
                        <i class="fa fa-random mr-2"></i>乱序
                    </button>
                    <button id="prev-btn" class="btn-secondary flex items-center w-full" disabled="">
                        <i class="fa fa-arrow-left mr-2"></i>上一题
                    </button>
                    <button id="collect-btn" class="btn-secondary flex items-center w-full">
                        <i class="fa fa-star-o mr-2"></i>收藏
                    </button>
                    <button id="skip-btn" class="btn-secondary flex items-center w-full">
                        <i class="fa fa-forward mr-2"></i>跳过
                    </button>
                    <button id="submit-btn" class="btn-primary flex items-center w-full">
                        提交答案<i class="fa fa-check ml-2"></i>
                    </button>
                    <button id="next-btn" class="btn-secondary flex items-center w-full" disabled="">
                        下一题<i class="fa fa-arrow-right ml-2"></i>
                    </button>
                </div>
            </div>
        </section>

        <!-- 中间题目区域 -->
        <section class="w-full lg:w-2/3">
            <div id="question-container" class="bg-white rounded-lg shadow-card p-6 mb-6">
                <!-- 题目内容将通过JavaScript动态插入 -->
                <div class="animate-pulse">
                    <div class="h-6 bg-gray-200 rounded w-3/4 mb-4"></div>
                    <div class="h-4 bg-gray-200 rounded w-full mb-2"></div>
                    <div class="h-4 bg-gray-200 rounded w-full mb-2"></div>
                    <div class="h-4 bg-gray-200 rounded w-5/6 mb-8"></div>
                    <div class="h-12 bg-gray-200 rounded w-full mb-3"></div>
                    <div class="h-12 bg-gray-200 rounded w-full mb-3"></div>
                    <div class="h-12 bg-gray-200 rounded w-full mb-3"></div>
                    <div class="h-12 bg-gray-200 rounded w-full"></div>
                </div>
            </div>

            <!-- 答案解析区域 -->
            <div id="explanation-container" class="bg-white rounded-lg shadow-card p-6 mb-6 hidden">
                <h3 class="text-lg font-semibold text-gray-800 mb-4 flex items-center">
                    <i class="fa fa-lightbulb-o text-warning mr-2"></i>
                    答案解析
                </h3>
                <div id="answer-result" class="mb-4 p-4 rounded-md"></div>
                <div id="explanation-content" class="text-gray-700 border-t pt-4">
                    <p class="font-medium">解析：</p>
                    <p id="explanation-text" class="mt-2"></p>
                </div>
            </div>
        </section>

        <!-- 右侧统计和进度区域 -->
        <aside class="w-full lg:w-1/6">
            <!-- 进度统计卡片 -->
            <div class="bg-white rounded-lg shadow-card p-6 mb-6">
                <h3 class="text-lg font-semibold text-gray-800 mb-4">进度统计</h3>
                <div class="space-y-4">
                    <div>
                        <div class="flex justify-between text-sm mb-1">
                            <span>完成率</span>
                            <span id="completion-rate">0%</span>
                        </div>
                        <div class="w-full bg-gray-200 rounded-full h-2.5">
                            <div id="completion-bar" class="bg-primary h-2.5 rounded-full" style="width: 0%"></div>
                        </div>
                    </div>
                    <div class="grid grid-cols-2 gap-4 text-center">
                        <div class="bg-green-50 p-3 rounded-lg">
                            <p class="text-sm text-gray-600">正确</p>
                            <p id="correct-count" class="text-xl font-bold text-success">0</p>
                        </div>
                        <div class="bg-red-50 p-3 rounded-lg">
                            <p class="text-sm text-gray-600">错误</p>
                            <p id="wrong-count" class="text-xl font-bold text-danger">0</p>
                        </div>
                    </div>
                    <div class="grid grid-cols-2 gap-4 text-center">
                        <div class="bg-blue-50 p-3 rounded-lg">
                            <p class="text-sm text-gray-600">收藏</p>
                            <p id="collected-count" class="text-xl font-bold text-primary">0</p>
                        </div>
                        <div class="bg-yellow-50 p-3 rounded-lg">
                            <p class="text-sm text-gray-600">跳过</p>
                            <p id="skipped-count" class="text-xl font-bold text-warning">0</p>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 题目导航卡片 -->
            <div class="bg-white rounded-lg shadow-card p-6">
                <h3 class="text-lg font-semibold text-gray-800 mb-4">题目导航</h3>
                <div id="question-nav" class="grid grid-cols-5 gap-2">
                    <!-- 题目导航按钮将通过JavaScript动态插入 -->
                </div>
            </div>
        </aside>
    </main>

    <!-- 底部信息 -->
    <footer class="bg-white border-t mt-8 py-4">
        <div class="container mx-auto px-4 text-center text-gray-600 text-sm">
            <p>智能刷题器 © 2025 | 提升学习效率的好帮手</p>
        </div>
    </footer>

    <!-- 文件上传模态框 -->
    <div id="upload-modal" class="fixed inset-0 bg-black bg-opacity-50 z-50 flex items-center justify-center hidden">
        <div class="bg-white rounded-lg shadow-lg p-6 w-full max-w-md">
            <div class="flex justify-between items-center mb-4">
                <h3 class="text-lg font-semibold text-gray-800">导入题库</h3>
                <button id="close-modal" class="text-gray-500 hover:text-gray-700">
                    <i class="fa fa-times"></i>
                </button>
            </div>
            <div class="mb-4">
                <label for="file-input" class="block text-sm font-medium text-gray-700 mb-2">选择JSON文件</label>
                <input type="file" id="file-input" accept=".json" class="block w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-md file:border-0 file:text-sm file:font-medium file:bg-primary file:text-white hover:file:bg-blue-600">
                <p class="mt-1 text-xs text-gray-500">请确保文件格式符合要求</p>
            </div>
            <div class="flex justify-end">
                <button id="cancel-upload" class="btn-secondary mr-2">取消</button>
                <button id="confirm-upload" class="btn-primary">导入</button>
            </div>
        </div>
    </div>

    <script>
        // 语言翻译对象
        const translations = {
            zh: {
                appTitle: '智能刷题器',
                practice: '开始练习',
                review: '错题复习',
                custom: '导题练习',
                edit: '题库管理',
                orderToggle: '顺序',
                randomToggle: '乱序',
                collect: '收藏',
                collected: '已收藏',
                skip: '跳过',
                submit: '提交答案',
                submitted: '已提交',
                prev: '上一题',
                next: '下一题',
                question: '题目',
                options: '选项',
                answer: '答案',
                explanation: '解析',
                correct: '正确',
                wrong: '错误',
                skipped: '跳过',
                collected: '收藏',
                totalQuestions: '总题数',
                wrongQuestions: '错题数',
                currentQuestion: '当前',
                completionRate: '完成率',
                noExplanation: '暂无解析',
                correctAnswer: '回答正确！',
                wrongAnswer: '回答错误，你的答案是 {userAnswer}，正确答案是 {correctAnswer}',
                selectOption: '请选择至少一个选项',
                importQuiz: '导入题库',
                selectJson: '选择JSON文件',
                cancel: '取消',
                confirm: '确认',
                importSuccess: '成功导入{count}道题目',
                importFailed: '导入失败: {error}',
                invalidFormat: '无效的题库格式：缺少questions数组',
                missingFields: '第{index}题缺少必要字段（题干、类型或答案）',
                fileReadError: '文件读取失败，请重试',
                defaultBank: '本地默认题库',
                uploadBank: '上传的题库',
                deleteBank: '删除',
                useBank: '使用',
                bankName: '题库名称',
                source: '来源',
                local: '本地',
                uploaded: '上传',
                questionNav: '题目导航',
                progress: '进度统计',
                startQuiz: '开始练习',
                randomQuiz: '随机练习',
                reviewMode: '错题复习',
                customMode: '导题练习',
                editMode: '题库管理',
                singleChoice: '单选',
                multipleChoice: '多选',
                trueFalse: '判断'
            },
            en: {
                appTitle: 'Smart Quiz App',
                practice: 'Start Practice',
                review: 'Review Mistakes',
                custom: 'Import Quiz',
                edit: 'Quiz Management',
                orderToggle: 'Order',
                randomToggle: 'Random',
                collect: 'Collect',
                collected: 'Collected',
                skip: 'Skip',
                submit: 'Submit Answer',
                submitted: 'Submitted',
                prev: 'Previous',
                next: 'Next',
                question: 'Question',
                options: 'Options',
                answer: 'Answer',
                explanation: 'Explanation',
                correct: 'Correct',
                wrong: 'Wrong',
                skipped: 'Skipped',
                collected: 'Collected',
                totalQuestions: 'Total Questions',
                wrongQuestions: 'Wrong Questions',
                currentQuestion: 'Current',
                completionRate: 'Completion Rate',
                noExplanation: 'No explanation',
                correctAnswer: 'Correct!',
                wrongAnswer: 'Wrong, your answer is {userAnswer}, correct answer is {correctAnswer}',
                selectOption: 'Please select at least one option',
                importQuiz: 'Import Quiz',
                selectJson: 'Select JSON File',
                cancel: 'Cancel',
                confirm: 'Confirm',
                importSuccess: 'Successfully imported {count} questions',
                importFailed: 'Import failed: {error}',
                invalidFormat: 'Invalid quiz format: missing questions array',
                missingFields: 'Question {index} is missing required fields (question, type, or answer)',
                fileReadError: 'File read failed, please try again',
                defaultBank: 'Local Default Quiz',
                uploadBank: 'Uploaded Quiz',
                deleteBank: 'Delete',
                useBank: 'Use',
                bankName: 'Quiz Name',
                source: 'Source',
                local: 'Local',
                uploaded: 'Uploaded',
                questionNav: 'Question Navigation',
                progress: 'Progress Statistics',
                startQuiz: 'Start Practice',
                randomQuiz: 'Random Practice',
                reviewMode: 'Review Mode',
                customMode: 'Import Mode',
                editMode: 'Management Mode',
                singleChoice: 'Single Choice',
                multipleChoice: 'Multiple Choice',
                trueFalse: 'True/False'
            }
        };

        // 获取翻译文本的函数
        function t(key, params = {}) {
            let text = translations[currentLanguage][key] || key;
            // 替换参数
            for (const [key, value] of Object.entries(params)) {
                text = text.replace(`{${key}}`, value);
            }
            return text;
        }

        // 全局变量
        let questions = [];
        let originalQuestions = []; // 存储原始顺序的题目
        let currentQuestionIndex = 0;
        let userAnswers = [];
        let collectedQuestions = [];
        let quizStats = {
            total: 0,
            completed: 0,
            correct: 0,
            wrong: 0,
            collected: 0,
            skipped: 0
        };
        let quizMode = 'random'; // 'random', 'review', 'custom'
        let isRandomOrder = false; // 控制顺序/乱序
        let unAnsweredQuestions = []; // 未做的题目索引
        let currentLanguage = 'zh'; // 当前语言，默认为中文
        let isDarkMode = false; // 是否开启暗黑模式
        
        // 题库管理系统
        let quizBanks = [];
        let currentQuizBankIndex = -1;

        // DOM元素
        const questionContainer = document.getElementById('question-container');
        const explanationContainer = document.getElementById('explanation-container');
        const answerResult = document.getElementById('answer-result');
        const explanationText = document.getElementById('explanation-text');
        const prevBtn = document.getElementById('prev-btn');
        const nextBtn = document.getElementById('next-btn');
        const submitBtn = document.getElementById('submit-btn');
        const skipBtn = document.getElementById('skip-btn');
        const collectBtn = document.getElementById('collect-btn');
        const questionCountEl = document.getElementById('question-count');
        const currentQuestionIndexEl = document.getElementById('current-question-index');
        const completionRateEl = document.getElementById('completion-rate');
        const completionBarEl = document.getElementById('completion-bar');
        const correctCountEl = document.getElementById('correct-count');
        const wrongCountEl = document.getElementById('wrong-count');
        const collectedCountEl = document.getElementById('collected-count');
        const skippedCountEl = document.getElementById('skipped-count');
        const questionNavEl = document.getElementById('question-nav');
        const practiceTab = document.getElementById('practice-tab');
        const reviewTab = document.getElementById('review-tab');
        const customTab = document.getElementById('custom-tab');
        const editTab = document.getElementById('edit-tab');
        const uploadModal = document.getElementById('upload-modal');
        const closeModalBtn = document.getElementById('close-modal');
        const cancelUploadBtn = document.getElementById('cancel-upload');
        const confirmUploadBtn = document.getElementById('confirm-upload');
        const fileInput = document.getElementById('file-input');

        // 初始化函数
        async function init() {
            try {
                // 加载本地题库
                const response = await fetch('questions.json');
                const data = await response.json();
                originalQuestions = data.questions; // 保存原始顺序
                // 根据设置决定是否打乱顺序
                questions = isRandomOrder ? shuffleArray([...originalQuestions]) : [...originalQuestions];
                initializeQuiz();
            } catch (error) {
                console.error('加载题库失败:', error);
                questionContainer.innerHTML = `
                    <div class="text-center py-8">
                        <i class="fa fa-exclamation-triangle text-warning text-4xl mb-4"></i>
                        <p class="text-gray-700">题库加载失败，请检查文件是否存在或格式是否正确。</p>
                        <button id="retry-load" class="btn-primary mt-4">重试</button>
                    </div>
                `;
                document.getElementById('retry-load').addEventListener('click', init);
            }
        }
        
        // 打乱数组顺序
        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }
        
        // 切换顺序/乱序
        function toggleOrder() {
            isRandomOrder = !isRandomOrder;
            // 保存当前题目索引
            const currentIndex = currentQuestionIndex;
            // 重新加载题目
            questions = isRandomOrder ? shuffleArray([...originalQuestions]) : [...originalQuestions];
            // 确保当前索引在新的题目数组范围内
            currentQuestionIndex = Math.min(currentIndex, questions.length - 1);
            // 更新UI
            updateStats();
            renderQuestionNav();
            showQuestion(currentQuestionIndex);
            updateButtonStates();
            // 更新题数显示
            questionCountEl.textContent = `${t('totalQuestions')}: ${questions.length}`;
            currentQuestionIndexEl.textContent = `${t('currentQuestion')}: ${currentQuestionIndex + 1}/${questions.length}`;
            // 更新按钮状态
            updateOrderButton();
        }
        
        // 更新顺序/乱序按钮状态
        function updateOrderButton() {
            const orderButton = document.getElementById('order-toggle');
            if (orderButton) {
                orderButton.innerHTML = isRandomOrder ? 
                    `<i class="fa fa-random mr-2"></i>${t('randomToggle')}` : 
                    `<i class="fa fa-list mr-2"></i>${t('orderToggle')}`;
            }
        }

        // 初始化测验
        function initializeQuiz() {
            // 重置状态
            currentQuestionIndex = 0;
            userAnswers = new Array(questions.length).fill(null);
            collectedQuestions = JSON.parse(localStorage.getItem('collectedQuestions') || '[]');
            quizStats = {
                total: questions.length,
                completed: 0,
                correct: 0,
                wrong: 0,
                collected: collectedQuestions.length,
                skipped: 0
            };
            
            // 初始化未做的题目索引
            unAnsweredQuestions = Array.from({length: questions.length}, (_, i) => i);

            // 更新UI
            updateStats();
            renderQuestionNav();
            showQuestion(currentQuestionIndex);
            updateButtonStates();
            
            // 更新题数显示
            questionCountEl.textContent = `${t('totalQuestions')}: ${questions.length}`;
            currentQuestionIndexEl.textContent = `${t('currentQuestion')}: ${currentQuestionIndex + 1}/${questions.length}`;
            
            // 添加顺序/乱序切换按钮
            addOrderToggleButton();
        }
        
        // 添加顺序/乱序切换按钮
        function addOrderToggleButton() {
            // 检查是否已经存在按钮
            let orderButton = document.getElementById('order-toggle');
            
            if (!orderButton) {
                // 创建按钮
                orderButton = document.createElement('button');
                orderButton.id = 'order-toggle';
                orderButton.className = 'btn-secondary flex items-center w-full';
                orderButton.innerHTML = isRandomOrder ? 
                    '<i class="fa fa-random mr-2"></i>乱序' : 
                    '<i class="fa fa-list mr-2"></i>顺序';
                
                // 添加到操作按钮区域
                const actionButtons = document.getElementById('action-buttons');
                if (actionButtons) {
                    // 在顶部添加按钮
                    actionButtons.insertBefore(orderButton, actionButtons.firstChild);
                }
            }
            
            // 移除旧的事件监听器，避免重复绑定
            orderButton.removeEventListener('click', toggleOrder);
            // 添加新的事件监听器
            orderButton.addEventListener('click', toggleOrder);
            
            // 更新按钮状态
            updateOrderButton();
        }

        // 渲染当前题目
        function showQuestion(index) {
            if (index < 0 || index >= originalQuestions.length) return;

            // 更新全局的currentQuestionIndex变量
            currentQuestionIndex = index;
            
            const question = originalQuestions[index];
            const userAnswer = userAnswers[index];
            const isAnswered = userAnswer !== null && userAnswer !== 'skipped';
            const isCollected = collectedQuestions.includes(index);
            
            // 检查题目类型，如果答案长度大于1，即使类型是单选也视为多选
            let questionType = question.类型;
            if (questionType === '单选' && question.答案.length > 1) {
                questionType = '多选';
            }

            // 更新当前题目索引显示
            currentQuestionIndexEl.textContent = `${t('currentQuestion')}: ${index + 1}/${originalQuestions.length}`;

            // 渲染题目内容
            const questionTypeClass = isDarkMode ? 'bg-gray-700 text-white' : 'bg-gray-100 text-gray-600';
            const questionTitleClass = isDarkMode ? 'text-white' : 'text-gray-800';
            
            questionContainer.innerHTML = `
                <div class="mb-6">
                    <h2 class="text-xl font-semibold ${questionTitleClass} mb-2">${question.题干}</h2>
                    <span class="inline-block px-2 py-1 ${questionTypeClass} text-sm rounded-full">${questionType}</span>
                </div>
                
                <div class="space-y-3 mb-6">
                    ${renderOptions(question, userAnswer, isAnswered, questionType)}
                </div>
            `;
            
            // 适配暗黑模式下的代码块样式
            if (isDarkMode) {
                // 查找所有highlight类的div
                const highlightDivs = questionContainer.querySelectorAll('.highlight');
                highlightDivs.forEach(div => {
                    div.style.background = 'transparent';
                    div.classList.add('bg-gray-800', 'p-4', 'rounded-lg');
                });
                
                // 查找所有pre标签
                const preTags = questionContainer.querySelectorAll('pre');
                preTags.forEach(pre => {
                    pre.style.background = 'transparent';
                    pre.classList.add('bg-gray-800', 'text-gray-300', 'p-4', 'rounded-lg');
                    // 查找pre标签内的code标签
                    const codeTags = pre.querySelectorAll('code');
                    codeTags.forEach(code => {
                        code.classList.add('text-gray-300');
                    });
                });
                
                // 直接查找code标签
                const codeTags = questionContainer.querySelectorAll('code');
                codeTags.forEach(code => {
                    code.classList.add('bg-gray-800', 'text-gray-300', 'px-1', 'py-0.5', 'rounded');
                });
            }

            // 更新收藏按钮状态
            collectBtn.innerHTML = isCollected 
                ? `<i class="fa fa-star mr-2 text-warning"></i>${t('collected')}` 
                : `<i class="fa fa-star-o mr-2"></i>${t('collect')}`;

            // 如果已经回答过且不是跳过，显示解析
            if (isAnswered && userAnswer !== 'skipped') {
                showExplanation(question, userAnswer);
            } else {
                explanationContainer.classList.add('hidden');
            }

            // 添加选项点击事件
            if (!isAnswered) {
                const options = questionContainer.querySelectorAll('.option-item');
                options.forEach(option => {
                    // 应用暗黑模式样式
                    if (isDarkMode) {
                        option.classList.add('bg-gray-700', 'text-white', 'border-gray-600', 'hover:bg-gray-600');
                    }
                    
                    option.addEventListener('click', () => {
                        // 单选逻辑
                        if (questionType === '单选') {
                            options.forEach(opt => opt.classList.remove('ring-2', 'ring-primary'));
                            option.classList.add('ring-2', 'ring-primary');
                            
                            // 检查是否是正确答案
                            const selectedOption = option.dataset.option;
                            // 检查之前是否是跳过的题目
                            const wasSkipped = userAnswers[currentQuestionIndex] === 'skipped';
                            
                            if (selectedOption === question.答案) {
                                // 记录用户答案
                                userAnswers[currentQuestionIndex] = selectedOption;
                                
                                // 从unAnsweredQuestions数组中移除当前题目索引
                                const currentIndex = unAnsweredQuestions.indexOf(currentQuestionIndex);
                                if (currentIndex > -1) {
                                    unAnsweredQuestions.splice(currentIndex, 1);
                                }
                                
                                // 更新统计
                                if (!wasSkipped) {
                                    quizStats.completed++;
                                } else {
                                    // 如果之前是跳过的题目，减少跳过计数
                                    quizStats.skipped--;
                                }
                                quizStats.correct++;
                                updateStats();
                                
                                // 保存到本地存储
                                saveProgress();
                                
                                // 跳转到下一题
                                if (unAnsweredQuestions.length > 0) {
                                    let nextIndex;
                                    if (isRandomOrder) {
                                        // 乱序模式：从未做的题目中随机选择一个
                                        const randomIndex = Math.floor(Math.random() * unAnsweredQuestions.length);
                                        nextIndex = unAnsweredQuestions[randomIndex];
                                    } else {
                                        // 顺序模式：按顺序选择下一个
                                        nextIndex = currentQuestionIndex + 1;
                                        if (nextIndex >= originalQuestions.length) {
                                            nextIndex = originalQuestions.length - 1;
                                        }
                                    }
                                    showQuestion(nextIndex);
                                }
                            } else {
                                // 记录用户答案
                                userAnswers[currentQuestionIndex] = selectedOption;
                                
                                // 从unAnsweredQuestions数组中移除当前题目索引
                                const currentIndex = unAnsweredQuestions.indexOf(currentQuestionIndex);
                                if (currentIndex > -1) {
                                    unAnsweredQuestions.splice(currentIndex, 1);
                                }
                                
                                // 更新统计
                                if (!wasSkipped) {
                                    quizStats.completed++;
                                } else {
                                    // 如果之前是跳过的题目，减少跳过计数
                                    quizStats.skipped--;
                                }
                                quizStats.wrong++;
                                updateStats();
                                
                                // 保存到本地存储
                                saveProgress();
                                
                                // 显示当前题目（带有答案的状态）
                                showQuestion(currentQuestionIndex);
                            }
                        } 
                        // 多选逻辑
                        else if (questionType === '多选') {
                            option.classList.toggle('ring-2');
                            option.classList.toggle('ring-primary');
                        }
                    });
                });
            }
            
            // 添加左右滑动切换题目功能
            // 定义触摸事件相关变量
            let touchStartX = 0;
            let touchEndX = 0;
            let isSwiping = false; // 防止连续滑动的标志
            
            // 定义触摸事件处理函数
            function handleTouchStart(e) {
                if (isSwiping) return; // 如果正在滑动，忽略新的触摸事件
                touchStartX = e.changedTouches[0].screenX;
            }
            
            function handleTouchEnd(e) {
                if (isSwiping) return; // 如果正在滑动，忽略新的触摸事件
                touchEndX = e.changedTouches[0].screenX;
                handleSwipe();
            }
            
            function handleSwipe() {
                const swipeThreshold = 50; // 滑动阈值
                const diff = touchEndX - touchStartX;
                
                if (Math.abs(diff) > swipeThreshold) {
                    isSwiping = true; // 开始滑动，设置标志
                    
                    if (diff > 0) {
                        // 向右滑动，切换到上一题
                        if (currentQuestionIndex > 0) {
                            showQuestion(currentQuestionIndex - 1);
                        } else {
                            isSwiping = false; // 如果已经是第一题，取消标志
                        }
                    } else {
                        // 向左滑动，切换到下一题
                        if (currentQuestionIndex < originalQuestions.length - 1) {
                            showQuestion(currentQuestionIndex + 1);
                        } else {
                            isSwiping = false; // 如果已经是最后一题，取消标志
                        }
                    }
                }
            }
            
            // 移除之前的触摸事件监听器（如果存在）
            questionContainer.removeEventListener('touchstart', handleTouchStart);
            questionContainer.removeEventListener('touchend', handleTouchEnd);
            
            // 添加触摸事件监听器
            questionContainer.addEventListener('touchstart', handleTouchStart);
            questionContainer.addEventListener('touchend', handleTouchEnd);

            // 更新按钮状态和题目导航
            updateButtonStates();
            renderQuestionNav();
            
            // 重置滑动标志，允许下一次滑动
            setTimeout(() => {
                isSwiping = false;
            }, 300); // 300毫秒的延迟，确保题目切换完成
        }

        // 渲染选项
        function renderOptions(question, userAnswer, isAnswered, questionType) {
            let optionsHtml = '';
            const options = [];
            
            // 检查是否是跳过的题目
            const isSkipped = userAnswer === 'skipped';
            // 对于跳过的题目，视为未回答
            const actualIsAnswered = isAnswered && !isSkipped;
            
            // 提取所有选项
            for (let i = 0; i < 26; i++) {
                const optionKey = `选项${String.fromCharCode(65 + i)}`; // 选项A, 选项B...
                if (question[optionKey]) {
                    options.push({
                        letter: String.fromCharCode(65 + i),
                        text: question[optionKey]
                    });
                }
            }

            // 渲染每个选项
            options.forEach(option => {
                const isSelected = userAnswer && userAnswer.includes(option.letter);
                const isCorrect = actualIsAnswered && question.答案.includes(option.letter);
                const isWrong = actualIsAnswered && isSelected && !question.答案.includes(option.letter);

                let optionClass = 'option-item p-4 rounded-lg border option-hover cursor-pointer ';
                
                if (isDarkMode) {
                    if (actualIsAnswered) {
                        if (isCorrect) {
                            optionClass += 'bg-green-900 border-green-700 text-white';
                        } else if (isWrong) {
                            optionClass += 'bg-red-900 border-red-700 text-white';
                        } else {
                            optionClass += 'bg-gray-800 border-gray-700 text-white';
                        }
                    } else {
                        optionClass += isSelected ? 'bg-blue-900 border-blue-700 text-white' : 'bg-gray-800 border-gray-700 text-white';
                    }
                } else {
                    if (actualIsAnswered) {
                        if (isCorrect) {
                            optionClass += 'bg-success-light border-success';
                        } else if (isWrong) {
                            optionClass += 'bg-danger-light border-danger';
                        } else {
                            optionClass += 'bg-white border-gray-200';
                        }
                    } else {
                        optionClass += isSelected ? 'bg-primary-light border-primary' : 'bg-white border-gray-300';
                    }
                }

                let circleClass = '';
                if (isDarkMode) {
                    circleClass = actualIsAnswered 
                        ? (isCorrect ? 'bg-green-700 text-white' : isWrong ? 'bg-red-700 text-white' : 'bg-gray-700 text-gray-300')
                        : isSelected ? 'bg-primary text-white' : 'bg-gray-300 text-gray-700';
                } else {
                    circleClass = actualIsAnswered 
                        ? (isCorrect ? 'bg-success text-white' : isWrong ? 'bg-danger text-white' : 'bg-gray-200 text-gray-600')
                        : isSelected ? 'bg-primary text-white' : 'bg-gray-300 text-gray-700';
                }

                optionsHtml += `
                    <div class="${optionClass}" data-option="${option.letter}">
                        <div class="flex items-start">
                            <div class="flex-shrink-0 w-6 h-6 rounded-full flex items-center justify-center mr-3 mt-0.5 ${circleClass}">
                                ${option.letter}
                            </div>
                            <div class="flex-grow">
                                ${option.text}
                            </div>
                        </div>
                    </div>
                `;
            });

            return optionsHtml;
        }

        // 显示答案解析
        function showExplanation(question, userAnswer) {
            const isCorrect = userAnswer === question.答案;
            
            if (isDarkMode) {
                answerResult.className = `mb-4 p-4 rounded-md ${isCorrect ? 'bg-green-900 text-green-400 border border-green-700' : 'bg-red-900 text-red-400 border border-red-700'}`;
                explanationContainer.classList.add('bg-gray-800', 'text-white', 'border-gray-700');
            } else {
                answerResult.className = `mb-4 p-4 rounded-md ${isCorrect ? 'bg-success-light text-success' : 'bg-danger-light text-danger'}`;
                explanationContainer.classList.remove('bg-gray-800', 'text-white', 'border-gray-700');
            }
            
            answerResult.innerHTML = `
                <div class="flex items-center">
                    <i class="fa fa-${isCorrect ? 'check-circle' : 'times-circle'} mr-2"></i>
                    <span>
                        ${isCorrect ? t('correctAnswer') : t('wrongAnswer', { userAnswer, correctAnswer: question.答案 })}
                    </span>
                </div>
            `;
            
            explanationText.textContent = question.解析 || t('noExplanation');
            explanationContainer.classList.remove('hidden');
            
            // 动画效果
            gsap.from(explanationContainer, { opacity: 0, y: 20, duration: 0.5 });
        }

        // 更新按钮状态
        function updateButtonStates() {
            prevBtn.disabled = currentQuestionIndex === 0;
            nextBtn.disabled = currentQuestionIndex === originalQuestions.length - 1;
            
            prevBtn.classList.toggle('opacity-50', prevBtn.disabled);
            nextBtn.classList.toggle('opacity-50', nextBtn.disabled);
            
            const isAnswered = userAnswers[currentQuestionIndex] !== null && userAnswers[currentQuestionIndex] !== 'skipped';
            submitBtn.disabled = isAnswered;
            submitBtn.classList.toggle('opacity-50', submitBtn.disabled);
            
            if (isAnswered) {
                submitBtn.innerHTML = t('submitted');
            } else {
                submitBtn.innerHTML = `${t('submit')}<i class="fa fa-check ml-2"></i>`;
            }
        }

        // 更新统计信息
        function updateStats() {
            completionRateEl.textContent = `${Math.round((quizStats.completed / quizStats.total) * 100)}%`;
            completionBarEl.style.width = `${(quizStats.completed / quizStats.total) * 100}%`;
            
            correctCountEl.textContent = quizStats.correct;
            wrongCountEl.textContent = quizStats.wrong;
            collectedCountEl.textContent = quizStats.collected;
            skippedCountEl.textContent = quizStats.skipped;
        }

        // 渲染题目导航
        function renderQuestionNav() {
            questionNavEl.innerHTML = '';
            
            for (let i = 0; i < originalQuestions.length; i++) {
                const isAnswered = userAnswers[i] !== null;
                const isSkipped = userAnswers[i] === 'skipped';
                const isCorrect = isAnswered && !isSkipped && userAnswers[i] === originalQuestions[i].答案;
                const isCurrent = i === currentQuestionIndex;
                const isCollected = collectedQuestions.includes(i);
                
                let btnClass = 'w-8 h-8 rounded-full flex items-center justify-center text-sm font-medium transition-all duration-300 ';
                
                if (isDarkMode) {
                    if (isCurrent) {
                        btnClass += 'ring-2 ring-offset-2 ring-blue-400 ';
                    }
                    
                    if (isAnswered) {
                        if (isSkipped) {
                            btnClass += 'bg-gray-600 text-white';
                        } else {
                            btnClass += isCorrect ? 'bg-green-700 text-white' : 'bg-red-700 text-white';
                        }
                    } else {
                        btnClass += 'bg-gray-700 text-white hover:bg-gray-600';
                    }
                } else {
                    if (isCurrent) {
                        btnClass += 'ring-2 ring-offset-2 ring-primary ';
                    }
                    
                    if (isAnswered) {
                        if (isSkipped) {
                            btnClass += 'bg-gray-400 text-white';
                        } else {
                            btnClass += isCorrect ? 'bg-success text-white' : 'bg-danger text-white';
                        }
                    } else {
                        btnClass += 'bg-gray-200 text-gray-700 hover:bg-gray-300';
                    }
                }
                
                const btn = document.createElement('button');
                btn.className = btnClass;
                btn.textContent = i + 1;
                
                if (isCollected) {
                    btn.innerHTML += '<i class="fa fa-star text-warning text-xs absolute"></i>';
                    btn.classList.add('relative');
                }
                
                btn.addEventListener('click', () => {
                    currentQuestionIndex = i;
                    showQuestion(currentQuestionIndex);
                    updateButtonStates();
                    renderQuestionNav(); // 重新渲染导航以更新当前题目标记
                });
                
                questionNavEl.appendChild(btn);
            }
        }

        // 提交答案
        function submitAnswer() {
            const selectedOptions = Array.from(questionContainer.querySelectorAll('.option-item.ring-2')).map(opt => opt.dataset.option);
            
            if (selectedOptions.length === 0) {
                alert(t('selectOption'));
                return;
            }
            
            // 对选项进行排序以确保顺序一致（针对多选题）
            const userAnswer = selectedOptions.sort().join('');
            const correctAnswer = originalQuestions[currentQuestionIndex].答案;
            let questionType = originalQuestions[currentQuestionIndex].类型;
            
            // 检查题目类型，如果答案长度大于1，即使类型是单选也视为多选
            if (questionType === '单选' && correctAnswer.length > 1) {
                questionType = '多选';
            }
            
            // 检查之前是否是跳过的题目
            const wasSkipped = userAnswers[currentQuestionIndex] === 'skipped';
            
            userAnswers[currentQuestionIndex] = userAnswer;
            
            // 更新统计
            if (wasSkipped) {
                // 如果之前是跳过的题目，减少跳过计数
                quizStats.skipped--;
            } else {
                // 否则增加完成计数
                quizStats.completed++;
            }
            
            const isCorrect = userAnswer === correctAnswer;
            if (isCorrect) {
                quizStats.correct++;
            } else {
                quizStats.wrong++;
            }
            
            updateStats();
            showQuestion(currentQuestionIndex);
            updateButtonStates();
            renderQuestionNav();
            
            // 保存到本地存储
            saveProgress();
            
            // 从unAnsweredQuestions数组中移除当前题目索引
            const currentIndex = unAnsweredQuestions.indexOf(currentQuestionIndex);
            if (currentIndex > -1) {
                unAnsweredQuestions.splice(currentIndex, 1);
            }
            
            // 功能优化：当选对了（只有多选题无论对错都要点“提交答案”）的时候，直接跳转到下一题
            if (isCorrect && questionType !== '多选') {
                if (unAnsweredQuestions.length > 0) {
                    // 跳转到下一题
                    let nextIndex;
                    if (isRandomOrder) {
                        // 乱序模式：从未做的题目中随机选择一个
                        const randomIndex = Math.floor(Math.random() * unAnsweredQuestions.length);
                        nextIndex = unAnsweredQuestions[randomIndex];
                    } else {
                        // 顺序模式：按顺序选择下一个
                        nextIndex = currentQuestionIndex + 1;
                        if (nextIndex >= originalQuestions.length) {
                            nextIndex = originalQuestions.length - 1;
                        }
                    }
                    showQuestion(nextIndex);
                }
            }
        }

        // 切换收藏状态
        function toggleCollect() {
            const index = currentQuestionIndex;
            const isCollected = collectedQuestions.includes(index);
            
            if (isCollected) {
                collectedQuestions = collectedQuestions.filter(i => i !== index);
                quizStats.collected--;
            } else {
                collectedQuestions.push(index);
                quizStats.collected++;
            }
            
            updateStats();
            renderQuestionNav();
            showQuestion(currentQuestionIndex); // 更新收藏按钮状态
            
            // 保存到本地存储
            localStorage.setItem('collectedQuestions', JSON.stringify(collectedQuestions));
        }

        // 跳过当前题目
        function skipQuestion() {
            if (userAnswers[currentQuestionIndex] === null) {
                userAnswers[currentQuestionIndex] = 'skipped';
                quizStats.skipped++;
                updateStats();
                saveProgress();
            }
            
            // 从unAnsweredQuestions数组中移除当前题目索引
            const currentIndex = unAnsweredQuestions.indexOf(currentQuestionIndex);
            if (currentIndex > -1) {
                unAnsweredQuestions.splice(currentIndex, 1);
            }
            
            // 移动到下一题
            if (unAnsweredQuestions.length > 0) {
                let nextIndex;
                if (isRandomOrder) {
                    // 乱序模式：从未做的题目中随机选择一个
                    const randomIndex = Math.floor(Math.random() * unAnsweredQuestions.length);
                    nextIndex = unAnsweredQuestions[randomIndex];
                } else {
                    // 顺序模式：按顺序选择下一个
                    nextIndex = currentQuestionIndex + 1;
                    if (nextIndex >= originalQuestions.length) {
                        nextIndex = originalQuestions.length - 1;
                    }
                }
                showQuestion(nextIndex);
                updateButtonStates();
                renderQuestionNav();
            }
        }

        // 保存进度到本地存储
        function saveProgress() {
            localStorage.setItem('userAnswers', JSON.stringify(userAnswers));
            localStorage.setItem('quizStats', JSON.stringify(quizStats));
        }
        
        // 加载题库列表
        function loadQuizBanks() {
            const savedBanks = localStorage.getItem('quizBanks');
            if (savedBanks) {
                quizBanks = JSON.parse(savedBanks);
            } else {
                // 默认添加本地题库
                quizBanks = [{
                    id: 'default',
                    name: '本地默认题库',
                    source: 'local'
                }];
                saveQuizBanks();
            }
        }
        
        // 保存题库列表
        function saveQuizBanks() {
            localStorage.setItem('quizBanks', JSON.stringify(quizBanks));
        }
        
        // 添加新题库
        function addQuizBank(quizData, fileName) {
            const newBank = {
                id: Date.now().toString(),
                name: quizData.name || fileName.replace('.json', ''),
                source: 'uploaded',
                questions: quizData.questions
            };
            quizBanks.push(newBank);
            saveQuizBanks();
            return newBank;
        }
        
        // 删除题库
        function deleteQuizBank(bankId) {
            quizBanks = quizBanks.filter(bank => bank.id !== bankId);
            saveQuizBanks();
        }
        
        // 切换到指定题库
        function switchToQuizBank(bankIndex) {
            if (bankIndex < 0 || bankIndex >= quizBanks.length) return;
            
            currentQuizBankIndex = bankIndex;
            const selectedBank = quizBanks[bankIndex];
            
            if (selectedBank.source === 'local') {
                // 加载本地默认题库
                init();
            } else {
                // 使用上传的题库
                originalQuestions = selectedBank.questions; // 保存原始顺序
                // 根据设置决定是否打乱顺序
                questions = isRandomOrder ? shuffleArray([...originalQuestions]) : [...originalQuestions];
                initializeQuiz();
            }
            
            // 直接切换标签样式，避免重复调用initializeQuiz
            [practiceTab, reviewTab, customTab, editTab].forEach(tab => {
                tab.classList.remove('tab-active');
                tab.classList.add('tab-inactive');
            });
            practiceTab.classList.remove('tab-inactive');
            practiceTab.classList.add('tab-active');
            quizMode = 'random';
        }

        // 加载进度从本地存储
        function loadProgress() {
            const savedAnswers = localStorage.getItem('userAnswers');
            const savedStats = localStorage.getItem('quizStats');
            
            if (savedAnswers) {
                userAnswers = JSON.parse(savedAnswers);
            }
            
            if (savedStats) {
                quizStats = JSON.parse(savedStats);
            }
        }

        // 显示题库列表
        function showQuizBankList() {
            // 加载题库列表
            loadQuizBanks();

        // 切换标签
        function switchTab(tabName) {
            // 重置所有标签样式
            [practiceTab, reviewTab, customTab, editTab].forEach(tab => {
                tab.classList.remove('tab-active');
                tab.classList.add('tab-inactive');
            });
            
            // 设置选中标签样式
            document.getElementById(`${tabName}-tab`).classList.remove('tab-inactive');
            document.getElementById(`${tabName}-tab`).classList.add('tab-active');
            
            // 根据标签切换模式
            switch (tabName) {
                case 'practice':
                    quizMode = 'random';
                    // 检查是否已经有选中的题库
                    if (currentQuizBankIndex >= 0 && currentQuizBankIndex < quizBanks.length) {
                        const selectedBank = quizBanks[currentQuizBankIndex];
                        if (selectedBank.source === 'local') {
                            // 加载本地默认题库
                            init();
                        } else {
                            // 使用已选中的上传题库
                            originalQuestions = selectedBank.questions; // 保存原始顺序
                            // 根据设置决定是否打乱顺序
                            questions = isRandomOrder ? shuffleArray([...originalQuestions]) : [...originalQuestions];
                            initializeQuiz();
                        }
                    } else {
                        // 重新初始化随机练习
                        init();
                    }
                    break;
                case 'review':
                    quizMode = 'review';
                    // 加载错题集
                    loadReviewMode();
                    break;
                case 'custom':
                    quizMode = 'custom';
                    // 显示题库列表
                    showQuizBankList();
                    break;
                case 'edit':
                    quizMode = 'edit';
                    // 显示编辑界面（简化版，实际应用中可能需要更复杂的实现）
                    alert('编辑功能正在开发中，敬请期待！');
                    // 切换回练习标签
                    switchTab('practice');
                    break;
            }
        }

        // 加载复习模式（错题集）
        function loadReviewMode() {
            const wrongQuestions = [];
            const wrongIndices = [];
            
            // 找出所有答错的题目
            userAnswers.forEach((answer, index) => {
                if (answer !== null && answer !== 'skipped' && answer !== questions[index].答案) {
                    wrongQuestions.push(questions[index]);
                    wrongIndices.push(index);
                }
            });
            
            if (wrongQuestions.length === 0) {
                questionContainer.innerHTML = `
                    <div class="text-center py-8">
                        <i class="fa fa-check-circle text-success text-4xl mb-4"></i>
                        <p class="text-gray-700">太棒了！目前没有错题需要复习。</p>
                        <button id="back-to-practice" class="btn-primary mt-4">返回练习</button>
                    </div>
                `;
                document.getElementById('back-to-practice').addEventListener('click', () => switchTab('practice'));
                explanationContainer.classList.add('hidden');
                return;
            }
            
            // 临时保存原题库
            const originalQuestions = [...questions];
            
            // 使用错题集
            questions = wrongQuestions;
            
            // 重置状态
            currentQuestionIndex = 0;
            userAnswers = new Array(wrongQuestions.length).fill(null);
            quizStats = {
                total: wrongQuestions.length,
                completed: 0,
                correct: 0,
                wrong: 0,
                collected: collectedQuestions.filter(i => wrongIndices.includes(i)).length,
                skipped: 0
            };
            
            // 更新UI
            updateStats();
            renderQuestionNav();
            showQuestion(currentQuestionIndex);
            updateButtonStates();
            
            // 更新题数显示
            questionCountEl.textContent = `${t('wrongQuestions')}: ${wrongQuestions.length}`;
            currentQuestionIndexEl.textContent = `${t('currentQuestion')}: ${currentQuestionIndex + 1}/${wrongQuestions.length}`;
            
            // 添加返回按钮
            const backButton = document.createElement('button');
            backButton.className = 'btn-secondary absolute top-4 right-4';
            backButton.innerHTML = '<i class="fa fa-arrow-left mr-2"></i>返回练习';
            backButton.addEventListener('click', () => {
                // 恢复原题库
                questions = originalQuestions;
                loadProgress(); // 加载之前的进度
                switchTab('practice');
                initializeQuiz();
            });
            
            questionContainer.style.position = 'relative';
            questionContainer.appendChild(backButton);
        }

        // 导入自定义题库
        function importCustomQuiz(file) {
            const reader = new FileReader();
            
            reader.onload = function(e) {
                try {
                    const data = JSON.parse(e.target.result);
                    
                    if (!data.questions || !Array.isArray(data.questions)) {
                        throw new Error(t('invalidFormat'));
                    }
                    
                    // 验证题目格式
                    for (let i = 0; i < data.questions.length; i++) {
                        const q = data.questions[i];
                        if (!q.题干 || !q.类型 || !q.答案) {
                            throw new Error(t('missingFields', { index: i + 1 }));
                        }
                    }
                    
                    // 添加到题库列表
                    addQuizBank(data, file.name);
                    
                    // 关闭模态框
                    uploadModal.classList.add('hidden');
                    
                    // 显示成功消息
                    alert(t('importSuccess', { count: data.questions.length }));
                    
                    // 重新显示题库列表
                    showQuizBankList();
                    
                } catch (error) {
                    alert(t('importFailed', { error: error.message }));
                }
            };
            
            reader.onerror = function() {
                alert(t('fileReadError'));
            };
            
            reader.readAsText(file);
        }

        // 事件监听器
        function setupEventListeners() {
            // 语言切换按钮
            document.getElementById('language-toggle').addEventListener('click', toggleLanguage);
            
            // 暗黑模式切换按钮
            document.getElementById('theme-toggle').addEventListener('click', toggleDarkMode);
            
            // 导航按钮
            prevBtn.addEventListener('click', () => {
                if (currentQuestionIndex > 0) {
                    currentQuestionIndex--;
                    showQuestion(currentQuestionIndex);
                    updateButtonStates();
                    renderQuestionNav();
                }
            });
            
            nextBtn.addEventListener('click', () => {
                if (unAnsweredQuestions.length > 0) {
                    let nextIndex;
                    if (isRandomOrder) {
                        // 乱序模式：从未做的题目中随机选择一个
                        const randomIndex = Math.floor(Math.random() * unAnsweredQuestions.length);
                        nextIndex = unAnsweredQuestions[randomIndex];
                    } else {
                        // 顺序模式：按顺序选择下一个
                        nextIndex = currentQuestionIndex + 1;
                        if (nextIndex >= originalQuestions.length) {
                            nextIndex = originalQuestions.length - 1;
                        }
                    }
                    showQuestion(nextIndex);
                    updateButtonStates();
                    renderQuestionNav();
                }
            });
            
            // 提交按钮
            submitBtn.addEventListener('click', submitAnswer);
            
            // 收藏按钮
            collectBtn.addEventListener('click', toggleCollect);
            
            // 跳过按钮
            skipBtn.addEventListener('click', skipQuestion);
            
            // 标签切换
            practiceTab.addEventListener('click', () => switchTab('practice'));
            reviewTab.addEventListener('click', () => switchTab('review'));
            customTab.addEventListener('click', () => switchTab('custom'));
            editTab.addEventListener('click', () => switchTab('edit'));
            
            // 模态框按钮
            closeModalBtn.addEventListener('click', () => uploadModal.classList.add('hidden'));
            cancelUploadBtn.addEventListener('click', () => uploadModal.classList.add('hidden'));
            confirmUploadBtn.addEventListener('click', () => {
                const file = fileInput.files[0];
                if (file) {
                    importCustomQuiz(file);
                } else {
                    alert(t('selectOption'));
                }
            });
            
            // 点击模态框外部关闭
            uploadModal.addEventListener('click', (e) => {
                if (e.target === uploadModal) {
                    uploadModal.classList.add('hidden');
                }
            });
            
            // 键盘快捷键
            document.addEventListener('keydown', (e) => {
                if (e.key === 'ArrowLeft') {
                    prevBtn.click();
                } else if (e.key === 'ArrowRight') {
                    nextBtn.click();
                } else if (e.key === 'Enter' && !submitBtn.disabled) {
                    submitAnswer();
                } else if (e.key === ' ') {
                    e.preventDefault();
                    toggleCollect();
                }
            });
        }

                    if (isDarkMode) {
                        themeToggle.classList.add('bg-gray-700', 'text-white');
                        themeToggle.classList.remove('bg-gray-200', 'text-gray-800');
                    } else {
                        themeToggle.classList.remove('bg-gray-700', 'text-white');
                        themeToggle.classList.add('bg-gray-200', 'text-gray-800');
                    }
                }
            }, 100);
        }

        // 更新UI文本
        function updateUI() {
            // 更新标题
            const appTitle = document.getElementById('app-title');
            if (appTitle) {
                appTitle.textContent = t('appTitle');
            }
            
            // 更新标签
            function getMobileText(text) {
                // 如果是英文且包含空格，返回第一个单词
                if (currentLanguage === 'en' && text.includes(' ')) {
                    return text.split(' ')[0];
                }
                // 否则返回前两个字符
                return text.length > 2 ? text.substring(0, 2) : text;
            }
            
            const practiceTab = document.getElementById('practice-tab');
            if (practiceTab) {
                practiceTab.innerHTML = `
                    <span class="block md:hidden">${getMobileText(t('practice'))}</span>
                    <span class="hidden md:block">${t('practice')}</span>
                `;
            }
            const reviewTab = document.getElementById('review-tab');
            if (reviewTab) {
                reviewTab.innerHTML = `
                    <span class="block md:hidden">${getMobileText(t('review'))}</span>
                    <span class="hidden md:block">${t('review')}</span>
                `;
            }
            const customTab = document.getElementById('custom-tab');
            if (customTab) {
                customTab.innerHTML = `
                    <span class="block md:hidden">${getMobileText(t('custom'))}</span>
                    <span class="hidden md:block">${t('custom')}</span>
                `;
            }
            const editTab = document.getElementById('edit-tab');
            if (editTab) {
                editTab.innerHTML = `
                    <span class="block md:hidden">${getMobileText(t('edit'))}</span>
                    <span class="hidden md:block">${t('edit')}</span>
                `;
            }
            
            // 更新按钮
            collectBtn.innerHTML = collectedQuestions.includes(currentQuestionIndex) 
                ? `<i class="fa fa-star mr-2 text-warning"></i>${t('collected')}` 
                : `<i class="fa fa-star-o mr-2"></i>${t('collect')}`;
            skipBtn.innerHTML = `<i class="fa fa-forward mr-2"></i>${t('skip')}`;
            submitBtn.innerHTML = userAnswers[currentQuestionIndex] !== null ? t('submitted') : `${t('submit')}<i class="fa fa-check ml-2"></i>`;
            prevBtn.innerHTML = `<i class="fa fa-arrow-left mr-2"></i>${t('prev')}`;
            nextBtn.innerHTML = `<i class="fa fa-arrow-right mr-2"></i>${t('next')}`;
            
            // 更新顺序/乱序按钮
            updateOrderButton();
            
            // 更新统计信息
            document.getElementById('question-count').textContent = `${t('totalQuestions')}: ${originalQuestions.length}`;
            document.getElementById('current-question-index').textContent = `${t('currentQuestion')}: ${currentQuestionIndex + 1}/${originalQuestions.length}`;
            
            // 更新题目导航
            renderQuestionNav();
            
            // 更新当前题目
            showQuestion(currentQuestionIndex);
        }

        // 启动应用
        function startApp() {
            setupEventListeners();
            loadProgress();
            loadQuizBanks(); // 加载题库列表
            init();
        }

        // 页面加载完成后启动应用
        document.addEventListener('DOMContentLoaded', startApp);
    </script>

</body></html>
