<html lang="zh-CN"><head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=0.8">
    <title>智能刷题器</title>
    <!-- Tailwind CSS v3 -->
    <script src="https://cdn.tailwindcss.com"></script>

    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">

        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#3b82f6',
                        secondary: '#60a5fa',
                        success: '#10b981',
                        danger: '#ef4444',
                        warning: '#f59e0b',
                        info: '#3b82f6',

                        sans: ['Inter', 'system-ui', 'sans-serif'],

                    }
                }
            }
        }

    <style type="text/tailwindcss">
        @layer utilities {
            .content-auto {
                content-visibility: auto;
            }
            .option-hover {
                @apply transition-all duration-300 hover:shadow-md hover:scale-[1.01];
            }
            .btn-primary {
                @apply bg-primary text-white px-4 py-2 rounded-md hover:bg-blue-600 transition-colors duration-300 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-opacity-50;
            }
            .btn-secondary {
                @apply bg-gray-200 text-gray-800 px-4 py-2 rounded-md hover:bg-gray-300 transition-colors duration-300 focus:outline-none focus:ring-2 focus:ring-gray-400 focus:ring-opacity-50;
            }
            .btn-success {
                @apply bg-success text-white px-4 py-2 rounded-md hover:bg-green-600 transition-colors duration-300 focus:outline-none focus:ring-2 focus:ring-green-500 focus:ring-opacity-50;
            }
            .btn-danger {
                @apply bg-danger text-white px-4 py-2 rounded-md hover:bg-red-600 transition-colors duration-300 focus:outline-none focus:ring-2 focus:ring-red-500 focus:ring-opacity-50;
            }
            .tab-active {
                @apply border-b-2 border-primary text-primary;
            }
            .tab-active-dark {
                @apply border-b-2 border-blue-400 text-blue-400;
            }
            .tab-inactive {
                @apply text-gray-500 hover:text-gray-700;
            }
            .tab-inactive-dark {
                @apply text-gray-400 hover:text-gray-300;
            }
            .glass-effect {
                @apply bg-white bg-opacity-80 backdrop-blur-md;
            }
            
            /* 暗黑模式样式 */
            body.bg-gray-900 .btn-primary {
                @apply bg-blue-600 hover:bg-blue-700;
            }
            body.bg-gray-900 .btn-secondary {
                @apply bg-gray-700 text-white hover:bg-gray-600;
            }
            body.bg-gray-900 .btn-success {
                @apply bg-green-700 hover:bg-green-800;
            }
            body.bg-gray-900 .btn-danger {
                @apply bg-red-700 hover:bg-red-800;
            }
        }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">
    <!-- 顶部导航栏 -->
    <header class="bg-white shadow-sm sticky top-0 z-50" id="app-header">
        <div class="container mx-auto px-4 py-3 flex justify-between items-center">
            <div class="flex items-center space-x-2">
                <i class="fa fa-book text-primary text-2xl"></i>
                <h1 class="text-xl font-bold text-gray-800 hidden md:block" id="app-title">智能刷题器</h1>
            </div>
            <div class="flex items-center space-x-2 md:space-x-4">
                <div class="block text-xs sm:text-sm">
                    <span id="question-count" class="text-gray-600">总题数: 0</span>
                    <span id="current-question-index" class="text-gray-600">当前: 0/0</span>
                </div>
                <div class="relative">
                    <div class="flex items-center">
                        <button id="language-toggle" class="btn-secondary flex items-center px-2 py-1 rounded-l-md text-sm border-r-0">
                            <i class="fa fa-globe"></i>
                            <span id="language-text" class="hidden md:inline ml-2">中文</span>
                        </button>
                        <button id="language-dropdown-toggle" class="btn-secondary flex items-center justify-center w-8 h-full rounded-r-md text-sm border-l-0">
                            <i class="fa fa-chevron-down"></i>
                        </button>
                    </div>
                    <div id="language-dropdown" class="absolute right-0 mt-1 w-48 bg-white rounded-md shadow-lg hidden z-50">
                        <div class="py-1">
                            <button class="language-option block w-full text-left px-4 py-2 text-sm hover:bg-gray-100" data-lang="zh">简体中文</button>
                            <button class="language-option block w-full text-left px-4 py-2 text-sm hover:bg-gray-100" data-lang="zh-TW">繁體中文</button>
                            <button class="language-option block w-full text-left px-4 py-2 text-sm hover:bg-gray-100" data-lang="en">English</button>
                            <button class="language-option block w-full text-left px-4 py-2 text-sm hover:bg-gray-100" data-lang="ru">Русский</button>
                            <button class="language-option block w-full text-left px-4 py-2 text-sm hover:bg-gray-100" data-lang="fr">Français</button>
                            <button class="language-option block w-full text-left px-4 py-2 text-sm hover:bg-gray-100" data-lang="pt">Português</button>
                            <button class="language-option block w-full text-left px-4 py-2 text-sm hover:bg-gray-100" data-lang="es">Español</button>
                            <button class="language-option block w-full text-left px-4 py-2 text-sm hover:bg-gray-100" data-lang="ar">العربية</button>
                            <button class="language-option block w-full text-left px-4 py-2 text-sm hover:bg-gray-100" data-lang="ko">한국어</button>
                            <button class="language-option block w-full text-left px-4 py-2 text-sm hover:bg-gray-100" data-lang="ja">日本語</button>
                        </div>
                    </div>
                </div>
                <button id="theme-toggle" class="btn-secondary flex items-center px-2 py-1 rounded-md text-sm">
                    <i class="fa fa-moon-o"></i>
                    <span id="theme-text" class="hidden md:inline ml-2">暗黑模式</span>
                </button>
            </div>
        </div>
        <!-- 功能切换标签 -->
        <div class="container mx-auto px-4 border-b">
            <nav class="flex space-x-4 md:space-x-8 overflow-x-auto">
                <button id="practice-tab" class="py-3 px-1 tab-active font-medium">
                    <span class="block md:hidden">开始</span>
                    <span class="hidden md:block">开始练习</span>
                </button>
                <button id="review-tab" class="py-3 px-1 tab-inactive font-medium">
                    <span class="block md:hidden">重做</span>
                    <span class="hidden md:block">重做练习</span>
                </button>
                <button id="custom-tab" class="py-3 px-1 tab-inactive font-medium">
                    <span class="block md:hidden">导题</span>
                    <span class="hidden md:block">导题练习</span>
                </button>
                <button id="edit-tab" class="py-3 px-1 tab-inactive font-medium">
                    <span class="block md:hidden">编辑</span>
                    <span class="hidden md:block">编辑题目</span>

            </nav>

    <!-- 主内容区 -->
    <main class="container mx-auto px-4 py-6 flex flex-col lg:flex-row gap-6">
        <!-- 左侧操作按钮区域 -->
        <section class="w-full lg:w-1/6">
            <div id="action-buttons" class="bg-white rounded-lg shadow-card p-4 h-full">
                <div class="grid grid-cols-2 md:grid-cols-1 gap-4">
                    <button id="order-toggle" class="btn-secondary flex items-center w-full">
                        <i class="fa fa-random mr-2"></i>乱序
                    </button>
                    <button id="prev-btn" class="btn-secondary flex items-center w-full" disabled="">
                        <i class="fa fa-arrow-left mr-2"></i>上一题
                    </button>
                    <button id="collect-btn" class="btn-secondary flex items-center w-full">
                        <i class="fa fa-star-o mr-2"></i>收藏
                    </button>
                    <button id="skip-btn" class="btn-secondary flex items-center w-full">
                        <i class="fa fa-forward mr-2"></i>跳过
                    </button>
                    <button id="submit-btn" class="btn-primary flex items-center w-full">
                        提交答案<i class="fa fa-check ml-2"></i>
                    </button>
                    <button id="next-btn" class="btn-secondary flex items-center w-full" disabled="">
                        下一题<i class="fa fa-arrow-right ml-2"></i>
                    </button>
                </div>
            </div>
        </section>

        <!-- 中间题目区域 -->
        <section class="w-full lg:w-2/3">
            <div id="question-container" class="bg-white rounded-lg shadow-card p-6 mb-6">
                <!-- 题目内容将通过JavaScript动态插入 -->
                <div class="animate-pulse">
                    <div class="h-6 bg-gray-200 rounded w-3/4 mb-4"></div>
                    <div class="h-4 bg-gray-200 rounded w-full mb-2"></div>
                    <div class="h-4 bg-gray-200 rounded w-full mb-2"></div>
                    <div class="h-4 bg-gray-200 rounded w-5/6 mb-8"></div>
                    <div class="h-12 bg-gray-200 rounded w-full mb-3"></div>
                    <div class="h-12 bg-gray-200 rounded w-full mb-3"></div>
                    <div class="h-12 bg-gray-200 rounded w-full mb-3"></div>
                    <div class="h-12 bg-gray-200 rounded w-full"></div>
                </div>
            </div>

            <!-- 答案解析区域 -->
            <div id="explanation-container" class="bg-white rounded-lg shadow-card p-6 mb-6 hidden">
                <h3 class="text-lg font-semibold text-gray-800 mb-4 flex items-center">
                    <i class="fa fa-lightbulb-o text-warning mr-2"></i>
                    答案解析
                </h3>
                <div id="answer-result" class="mb-4 p-4 rounded-md"></div>
                <div id="explanation-content" class="text-gray-700 border-t pt-4">
                    <p class="font-medium">解析：</p>
                    <p id="explanation-text" class="mt-2"></p>
                </div>
            </div>
        </section>

        <!-- 右侧统计和进度区域 -->
        <aside class="w-full lg:w-1/6">
            <!-- 进度统计卡片 -->
            <div class="bg-white rounded-lg shadow-card p-6 mb-6">
                <h3 class="text-lg font-semibold text-gray-800 mb-4" id="progress-title">进度统计</h3>
                <div class="space-y-4">
                    <div>
                        <div class="flex justify-between text-sm mb-1">
                            <span id="completion-rate-label">完成率</span>
                            <span id="completion-rate">0%</span>
                        </div>
                        <div class="w-full bg-gray-200 rounded-full h-2.5">
                            <div id="completion-bar" class="bg-primary h-2.5 rounded-full" style="width: 0%"></div>
                        </div>
                    </div>
                    <div class="grid grid-cols-2 gap-4 text-center">
                        <div class="bg-green-50 p-3 rounded-lg">
                            <p class="text-sm text-gray-600" id="correct-label">正确</p>
                            <p id="correct-count" class="text-xl font-bold text-success">0</p>
                        </div>
                        <div class="bg-red-50 p-3 rounded-lg">
                            <p class="text-sm text-gray-600" id="wrong-label">错误</p>
                            <p id="wrong-count" class="text-xl font-bold text-danger">0</p>
                        </div>
                    </div>
                    <div class="grid grid-cols-2 gap-4 text-center">
                        <div class="bg-blue-50 p-3 rounded-lg">
                            <p class="text-sm text-gray-600" id="collected-label">收藏</p>
                            <p id="collected-count" class="text-xl font-bold text-primary">0</p>
                        </div>
                        <div class="bg-yellow-50 p-3 rounded-lg">
                            <p class="text-sm text-gray-600" id="skipped-label">跳过</p>
                            <p id="skipped-count" class="text-xl font-bold text-warning">0</p>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 题目导航卡片 -->
            <div class="bg-white rounded-lg shadow-card p-6">
                <h3 class="text-lg font-semibold text-gray-800 mb-4" id="question-nav-title">题目导航</h3>
                <div id="question-nav" class="grid grid-cols-5 gap-2">
                    <!-- 题目导航按钮将通过JavaScript动态插入 -->
                </div>
            </div>
        </aside>
    </main>

    <!-- 底部信息 -->
    <footer class="bg-white border-t mt-8 py-4">
        <div class="container mx-auto px-4 text-center text-gray-600 text-sm">
            <p>智能刷题器 © 2025 | 提升学习效率的好帮手</p>
        </div>
    </footer>

    <!-- 文件上传模态框 -->
    <div id="upload-modal" class="fixed inset-0 bg-black bg-opacity-50 z-50 flex items-center justify-center hidden">
        <div class="bg-white rounded-lg shadow-lg p-6 w-full max-w-md">
            <div class="flex justify-between items-center mb-4">
                <h3 class="text-lg font-semibold text-gray-800" id="upload-modal-title">导入题库</h3>
                <button id="close-modal" class="text-gray-500 hover:text-gray-700">

            <div class="flex justify-end">
                <button id="cancel-upload" class="btn-secondary mr-2">取消</button>
                <button id="confirm-upload" class="btn-primary">导入</button>
            </div>
        </div>
    </div>

        <div class="bg-white rounded-lg shadow-lg p-6 w-full max-w-3xl max-h-[80vh] overflow-hidden">
            <div class="flex justify-between items-center mb-4">
                <h3 class="text-lg font-semibold text-gray-800" id="export-modal-title">导出题库</h3>
                <button id="close-export-modal" class="text-gray-500 hover:text-gray-700">
                    <i class="fa fa-times"></i>
                </button>
            </div>
            <div class="mb-4">
                <textarea id="export-json-content" class="w-full h-64 p-3 border rounded-lg font-mono text-sm" readonly></textarea>
            </div>
            <div class="flex justify-end space-x-2">
                <button id="copy-json" class="btn-secondary px-4 py-2">复制</button>
                <button id="download-json" class="btn-primary px-4 py-2">下载</button>
                <button id="close-export" class="btn-danger px-4 py-2">关闭</button>
            </div>
        </div>
    </div>

        // 获取翻译文本的函数
        function t(key, params = {}) {
            let text = (translations[currentLanguage] && translations[currentLanguage][key]) || key;
            // 替换参数
            for (const [key, value] of Object.entries(params)) {
                text = text.replace(`{${key}}`, value);
            }
            return text;
        }

        // 全局变量
        let questions = [];
        let originalQuestions = []; // 存储原始顺序的题目
        let currentQuestionIndex = 0;
        let userAnswers = [];
        let collectedQuestions = [];
        let quizStats = {
            total: 0,
            completed: 0,
            correct: 0,
            wrong: 0,
            collected: 0,
            skipped: 0
        };
        let quizMode = 'random'; // 'random', 'review', 'custom'
        let isRandomOrder = false; // 控制顺序/乱序
        let unAnsweredQuestions = []; // 未做的题目索引
        let answeredQuestions = []; // 已回答的题目索引
        let navigationHistory = []; // 导航历史记录，用于上一题/下一题导航
        let historyIndex = -1; // 当前在导航历史中的位置
        let currentLanguage = 'zh'; // 当前语言，默认为中文
        let isDarkMode = false; // 是否开启暗黑模式
        let isSwiping = false; // 防止连续滑动的标志

        let quizBanks = [];
        let currentQuizBankIndex = -1;
        let currentExportBank = null; // 当前导出的题库信息

        const explanationContainer = document.getElementById('explanation-container');
        const answerResult = document.getElementById('answer-result');

        const nextBtn = document.getElementById('next-btn');
        const submitBtn = document.getElementById('submit-btn');
        const skipBtn = document.getElementById('skip-btn');
        const collectBtn = document.getElementById('collect-btn');
        const questionCountEl = document.getElementById('question-count');
        const currentQuestionIndexEl = document.getElementById('current-question-index');
        const completionRateEl = document.getElementById('completion-rate');
        const completionBarEl = document.getElementById('completion-bar');
        const correctCountEl = document.getElementById('correct-count');
        const wrongCountEl = document.getElementById('wrong-count');
        const collectedCountEl = document.getElementById('collected-count');
        const skippedCountEl = document.getElementById('skipped-count');
        const questionNavEl = document.getElementById('question-nav');
        const practiceTab = document.getElementById('practice-tab');
        const reviewTab = document.getElementById('review-tab');
        const customTab = document.getElementById('custom-tab');
        const editTab = document.getElementById('edit-tab');
        const uploadModal = document.getElementById('upload-modal');
        const closeModalBtn = document.getElementById('close-modal');
        const cancelUploadBtn = document.getElementById('cancel-upload');
        const confirmUploadBtn = document.getElementById('confirm-upload');
        const fileInput = document.getElementById('file-input');

        // 初始化函数
        async function init() {
            try {
                // 加载翻译文件
                await loadTranslations();
                
                // 加载本地题库
                const response = await fetch('questions.json');
                const data = await response.json();
                originalQuestions = data.questions; // 保存原始顺序
                // 根据设置决定是否打乱顺序
                questions = isRandomOrder ? shuffleArray([...originalQuestions]) : [...originalQuestions];
                initializeQuiz();
            } catch (error) {
                console.error('加载题库失败:', error);
                questionContainer.innerHTML = `
                    <div class="text-center py-8">
                        <i class="fa fa-exclamation-triangle text-warning text-4xl mb-4"></i>
                        <p class="text-gray-700">题库加载失败，请检查文件是否存在或格式是否正确。</p>
                        <button id="retry-load" class="btn-primary mt-4">重试</button>
                    </div>
                `;
                document.getElementById('retry-load').addEventListener('click', init);
            }
        }
        
        // 打乱数组顺序
        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }
        
        // 切换顺序/乱序
        function toggleOrder() {
            isRandomOrder = !isRandomOrder;
            // 保存当前题目索引
            const currentIndex = currentQuestionIndex;
            // 重新加载题目
            questions = isRandomOrder ? shuffleArray([...originalQuestions]) : [...originalQuestions];
            // 确保当前索引在新的题目数组范围内
            currentQuestionIndex = Math.min(currentIndex, questions.length - 1);
            // 更新UI
            updateStats();
            renderQuestionNav();
            showQuestion(currentQuestionIndex);
            updateButtonStates();
            // 更新题数显示
            questionCountEl.textContent = `${t('totalQuestions')}: ${questions.length}`;
            currentQuestionIndexEl.textContent = `${t('currentQuestion')}: ${currentQuestionIndex + 1}/${questions.length}`;
            // 更新按钮状态
            updateOrderButton();
        }
        
        // 更新顺序/乱序按钮状态
        function updateOrderButton() {
            const orderButton = document.getElementById('order-toggle');
            if (orderButton) {
                orderButton.innerHTML = isRandomOrder ? 
                    `<i class="fa fa-random mr-2"></i>${t('randomToggle')}` : 
                    `<i class="fa fa-list mr-2"></i>${t('orderToggle')}`;
            }
        }

        // 初始化测验
        function initializeQuiz() {
            // 尝试加载保存的进度
            const savedProgress = localStorage.getItem('quizProgress');
            let loadedProgress = false;
            
            if (savedProgress) {
                try {
                    const progressData = JSON.parse(savedProgress);
                    // 检查进度是否有效（题目数量是否匹配）
                    if (progressData.userAnswers && progressData.userAnswers.length === questions.length) {
                        // 加载保存的状态
                        currentQuestionIndex = progressData.currentQuestionIndex || 0;
                        userAnswers = progressData.userAnswers;
                        quizStats = progressData.quizStats || {
                            total: questions.length,
                            completed: 0,
                            correct: 0,
                            wrong: 0,
                            collected: 0,
                            skipped: 0
                        };
                        unAnsweredQuestions = progressData.unAnsweredQuestions || Array.from({length: questions.length}, (_, i) => i);
                        answeredQuestions = progressData.answeredQuestions || [];
                        isRandomOrder = progressData.isRandomOrder || false;
                        currentQuizBankIndex = progressData.currentQuizBankIndex || 0;
                        loadedProgress = true;
                    }
                } catch (error) {
                    console.error('加载进度失败:', error);
                }
            }
            
            // 如果没有加载到有效进度，重置状态
            if (!loadedProgress) {
                currentQuestionIndex = 0;
                userAnswers = new Array(questions.length).fill(null);
                collectedQuestions = JSON.parse(localStorage.getItem('collectedQuestions') || '[]');
                quizStats = {
                    total: questions.length,
                    completed: 0,
                    correct: 0,
                    wrong: 0,
                    collected: collectedQuestions.length,
                    skipped: 0
                };
                
                // 初始化未做的题目索引
                unAnsweredQuestions = Array.from({length: questions.length}, (_, i) => i);
                // 清空已回答的题目索引
                answeredQuestions = [];
            }
            
            // 重置导航历史
            navigationHistory = [];
            historyIndex = -1;

            // 更新UI
            updateStats();
            renderQuestionNav();
            showQuestion(currentQuestionIndex);
            updateButtonStates();
            
            // 更新题数显示
            questionCountEl.textContent = `${t('totalQuestions')}: ${questions.length}`;
            currentQuestionIndexEl.textContent = `${t('currentQuestion')}: ${currentQuestionIndex + 1}/${questions.length}`;
            
            // 添加顺序/乱序切换按钮
            addOrderToggleButton();
        }
        
        // 添加顺序/乱序切换按钮
        function addOrderToggleButton() {
            // 检查是否已经存在按钮
            let orderButton = document.getElementById('order-toggle');
            
            if (!orderButton) {
                // 创建按钮
                orderButton = document.createElement('button');
                orderButton.id = 'order-toggle';
                orderButton.className = 'btn-secondary flex items-center w-full';
                orderButton.innerHTML = isRandomOrder ? 
                    '<i class="fa fa-random mr-2"></i>乱序' : 
                    '<i class="fa fa-list mr-2"></i>顺序';
                
                // 添加到操作按钮区域
                const actionButtons = document.getElementById('action-buttons');
                if (actionButtons) {
                    // 在顶部添加按钮
                    actionButtons.insertBefore(orderButton, actionButtons.firstChild);
                }
            }
            
            // 移除旧的事件监听器，避免重复绑定
            orderButton.removeEventListener('click', toggleOrder);
            // 添加新的事件监听器
            orderButton.addEventListener('click', toggleOrder);
            
            // 更新按钮状态
            updateOrderButton();
        }

        // 渲染当前题目
        function showQuestion(index) {
            let question;
            let userAnswer;
            let isAnswered;
            let isCollected;
            let originalIndex;
            
            // 更新全局的currentQuestionIndex变量
            currentQuestionIndex = index;
            
            // 更新导航历史
            if (quizMode !== 'review') { // 只在练习模式下跟踪导航历史
                // 检查当前索引是否已经在导航历史中，并且是通过上一题/下一题按钮导航的
                const isNavigatingHistory = navigationHistory.includes(index) && Math.abs(navigationHistory.indexOf(index) - historyIndex) <= 1;
                
                if (!isNavigatingHistory) {
                    // 不是在导航历史，添加新记录
                    if (historyIndex === navigationHistory.length - 1) {
                        // 正常前进，添加到历史记录
                        navigationHistory.push(index);
                        historyIndex++;
                    } else {
                        // 从历史记录中返回，截断历史记录
                        navigationHistory = navigationHistory.slice(0, historyIndex + 1);
                        navigationHistory.push(index);
                        historyIndex++;
                    }
                } else {
                    // 是在导航历史中导航，只更新历史索引
                    historyIndex = navigationHistory.indexOf(index);
                }
            }
            
            if (quizMode === 'review') {
                // 错题复习模式
                if (index < 0 || index >= questions.length) return;
                
                question = questions[index];
                userAnswer = userAnswers[index];
                isAnswered = userAnswer !== null && userAnswer !== 'skipped';
                
                // 获取原始索引
                originalIndex = wrongIndexMap[index];
                isCollected = collectedQuestions.includes(originalIndex);
            } else {
                // 练习模式
                if (index < 0 || index >= originalQuestions.length) return;
                
                // 如果当前题目不在已回答数组中，添加进去（避免重复添加）
                if (!answeredQuestions.includes(index)) {
                    answeredQuestions.push(index);
                }
                
                question = originalQuestions[index];
                userAnswer = userAnswers[index];
                isAnswered = userAnswer !== null && userAnswer !== 'skipped';
                isCollected = collectedQuestions.includes(index);
                originalIndex = index;
            }
            
            // 检查题目类型，如果答案长度大于1，即使类型是单选也视为多选
            let questionType = question.类型;
            if (questionType === '单选' && question.答案.length > 1) {
                questionType = '多选';
            }

            // 更新当前题目索引显示
            let totalQuestions;
            if (quizMode === 'review') {
                totalQuestions = questions.length;
            } else {
                totalQuestions = originalQuestions.length;
            }
            currentQuestionIndexEl.textContent = `${t('currentQuestion')}: ${index + 1}/${totalQuestions}`;

            // 渲染题目内容
            const questionTypeClass = isDarkMode ? 'bg-gray-700 text-white' : 'bg-gray-100 text-gray-600';
            const questionTitleClass = isDarkMode ? 'text-white' : 'text-gray-800';
            
            questionContainer.innerHTML = `
                <div class="mb-6">
                    <h2 class="text-xl font-semibold ${questionTitleClass} mb-2">${question.题干}</h2>
                    <span class="inline-block px-2 py-1 ${questionTypeClass} text-sm rounded-full">${questionType}</span>
                </div>
                
                <div class="space-y-3 mb-6">
                    ${renderOptions(question, userAnswer, isAnswered, questionType, quizMode, currentQuestionIndex)}
                </div>
            `;
            
            // 适配暗黑模式下的代码块样式
            if (isDarkMode) {
                // 查找所有highlight类的div
                const highlightDivs = questionContainer.querySelectorAll('.highlight');
                highlightDivs.forEach(div => {
                    div.style.background = 'transparent';
                    div.classList.add('bg-gray-800', 'p-4', 'rounded-lg');
                });
                
                // 查找所有pre标签
                const preTags = questionContainer.querySelectorAll('pre');
                preTags.forEach(pre => {
                    pre.style.background = 'transparent';
                    pre.classList.add('bg-gray-800', 'text-gray-300', 'p-4', 'rounded-lg');
                    // 查找pre标签内的code标签
                    const codeTags = pre.querySelectorAll('code');
                    codeTags.forEach(code => {
                        code.classList.add('text-gray-300');
                    });
                });
                
                // 直接查找code标签
                const codeTags = questionContainer.querySelectorAll('code');
                codeTags.forEach(code => {
                    code.classList.add('bg-gray-800', 'text-gray-300', 'px-1', 'py-0.5', 'rounded');
                });
            }

            // 更新收藏按钮状态
            collectBtn.innerHTML = isCollected 
                ? `<i class="fa fa-star mr-2 text-warning"></i>${t('collected')}` 
                : `<i class="fa fa-star-o mr-2"></i>${t('collect')}`;

            // 显示解析的条件：
            // 1. 练习模式下已回答
            // 2. 错题复习模式下已提交答案
            let showExpl = false;
            if (quizMode === 'review') {
                showExpl = reviewSubmittedQuestions.includes(currentQuestionIndex);
            } else {
                showExpl = isAnswered && userAnswer !== 'skipped';
            }
            
            if (showExpl) {
                showExplanation(question, userAnswer);
            } else {
                explanationContainer.classList.add('hidden');
            }

            // 添加选项点击事件
            // 只有在未回答或在错题复习模式下且题目未被锁定时才允许点击选项
            if (!isAnswered || (quizMode === 'review' && !lockedQuestions.includes(currentQuestionIndex))) {
                const options = questionContainer.querySelectorAll('.option-item');
                options.forEach(option => {
                    // 应用暗黑模式样式
                    if (isDarkMode) {
                        option.classList.add('bg-gray-700', 'text-white', 'border-gray-600', 'hover:bg-gray-600');
                    }
                    
                    option.addEventListener('click', () => {
                        // 单选逻辑
                        if (questionType === '单选') {
                            options.forEach(opt => opt.classList.remove('ring-2', 'ring-primary'));
                            option.classList.add('ring-2', 'ring-primary');
                            
                            // 在练习模式下才自动提交答案
                            if (quizMode !== 'review') {
                                // 检查是否是正确答案
                                const selectedOption = option.dataset.option;
                                // 检查之前是否是跳过的题目
                                const wasSkipped = userAnswers[currentQuestionIndex] === 'skipped';
                                
                                if (selectedOption === question.答案) {
                                    // 记录用户答案
                                    userAnswers[currentQuestionIndex] = selectedOption;
                                    
                                    // 从unAnsweredQuestions数组中移除当前题目索引
                                    const currentIndex = unAnsweredQuestions.indexOf(currentQuestionIndex);
                                    if (currentIndex > -1) {
                                        unAnsweredQuestions.splice(currentIndex, 1);
                                    }
                                    
                                    // 更新统计
                                    if (!wasSkipped) {
                                        quizStats.completed++;
                                    } else {
                                        // 如果之前是跳过的题目，减少跳过计数
                                        quizStats.skipped--;
                                    }
                                    quizStats.correct++;
                                    updateStats();
                                    
                                    // 保存到本地存储
                                    saveProgress();
                                    
                                    // 跳转到下一题
                                    if (unAnsweredQuestions.length > 0) {
                                        let nextIndex;
                                        if (isRandomOrder) {
                                            // 乱序模式：从未做的题目中随机选择一个
                                            const randomIndex = Math.floor(Math.random() * unAnsweredQuestions.length);
                                            nextIndex = unAnsweredQuestions[randomIndex];
                                        } else {
                                            // 顺序模式：按顺序选择下一个
                                            nextIndex = currentQuestionIndex + 1;
                                            if (nextIndex >= originalQuestions.length) {
                                                nextIndex = originalQuestions.length - 1;
                                            }
                                        }
                                        showQuestion(nextIndex);
                                    }
                                } else {
                                    // 记录用户答案
                                    userAnswers[currentQuestionIndex] = selectedOption;
                                    
                                    // 从unAnsweredQuestions数组中移除当前题目索引
                                    const currentIndex = unAnsweredQuestions.indexOf(currentQuestionIndex);
                                    if (currentIndex > -1) {
                                        unAnsweredQuestions.splice(currentIndex, 1);
                                    }
                                    
                                    // 更新统计
                                    if (!wasSkipped) {
                                        quizStats.completed++;
                                    } else {
                                        // 如果之前是跳过的题目，减少跳过计数
                                        quizStats.skipped--;
                                    }
                                    quizStats.wrong++;
                                    updateStats();
                                    
                                    // 保存到本地存储
                                    saveProgress();
                                    
                                    // 显示当前题目（带有答案的状态）
                                    showQuestion(currentQuestionIndex);
                                }
                            }
                        } 
                        // 多选逻辑
                        else if (questionType === '多选') {
                            option.classList.toggle('ring-2');
                            option.classList.toggle('ring-primary');
                        }
                    });
                });
            }
            
            // 添加左右滑动切换题目功能
            // 定义触摸事件相关变量
            let touchStartX = 0;
            let touchEndX = 0;
            
            // 定义触摸事件处理函数
            function handleTouchStart(e) {
                if (isSwiping) return; // 如果正在滑动，忽略新的触摸事件
                touchStartX = e.changedTouches[0].screenX;
            }
            
            function handleTouchEnd(e) {
                if (isSwiping) return; // 如果正在滑动，忽略新的触摸事件
                touchEndX = e.changedTouches[0].screenX;
                handleSwipe();
            }
            
            function handleSwipe() {
                const swipeThreshold = 50; // 滑动阈值
                const diff = touchEndX - touchStartX;
                
                if (Math.abs(diff) > swipeThreshold) {
                    isSwiping = true; // 开始滑动，设置标志
                    
                    if (diff > 0) {
                        // 向右滑动，切换到上一题
                        if (currentQuestionIndex > 0) {
                            showQuestion(currentQuestionIndex - 1);
                        } else {
                            isSwiping = false; // 如果已经是第一题，取消标志
                        }
                    } else {
                        // 向左滑动，切换到下一题
                        if (currentQuestionIndex < originalQuestions.length - 1) {
                            showQuestion(currentQuestionIndex + 1);
                        } else {
                            isSwiping = false; // 如果已经是最后一题，取消标志
                        }
                    }
                }
            }
            
            // 移除之前的触摸事件监听器（如果存在）
            questionContainer.removeEventListener('touchstart', handleTouchStart);
            questionContainer.removeEventListener('touchend', handleTouchEnd);
            
            // 添加触摸事件监听器
            questionContainer.addEventListener('touchstart', handleTouchStart);
            questionContainer.addEventListener('touchend', handleTouchEnd);

            // 更新按钮状态和题目导航
            updateButtonStates();
            renderQuestionNav();
            
            // 重置滑动标志，允许下一次滑动
            setTimeout(() => {
                isSwiping = false;
            }, 300); // 300毫秒的延迟，确保题目切换完成
        }

        // 渲染选项
        function renderOptions(question, userAnswer, isAnswered, questionType, quizMode, index) {
            let optionsHtml = '';
            const options = [];
            
            // 检查是否是跳过的题目
            const isSkipped = userAnswer === 'skipped';
            // 对于跳过的题目，视为未回答
            const actualIsAnswered = isAnswered && !isSkipped;
            
            // 提取所有选项
            for (let i = 0; i < 26; i++) {
                const optionKey = `选项${String.fromCharCode(65 + i)}`; // 选项A, 选项B...
                if (question[optionKey]) {
                    options.push({
                        letter: String.fromCharCode(65 + i),
                        text: question[optionKey]
                    });
                }
            }

            // 渲染每个选项
            options.forEach(option => {
                let isSelected;
                let isCorrect;
                let isWrong;
                
                if (quizMode === 'review') {
                    // 在错题复习模式下
                    const isSubmitted = reviewSubmittedQuestions.includes(index);
                    if (isSubmitted) {
                        // 已提交答案，显示答案状态
                        isSelected = userAnswer && userAnswer.includes(option.letter);
                        isCorrect = question.答案.includes(option.letter);
                        isWrong = isSelected && !question.答案.includes(option.letter);
                    } else {
                        // 未提交答案，不显示上一次的选择状态
                        isSelected = false;
                        isCorrect = false;
                        isWrong = false;
                    }
                } else {
                    // 练习模式
                    isSelected = userAnswer && userAnswer.includes(option.letter);
                    isCorrect = actualIsAnswered && question.答案.includes(option.letter);
                    isWrong = actualIsAnswered && isSelected && !question.答案.includes(option.letter);
                }

                let optionClass = 'option-item p-4 rounded-lg border option-hover ';
                
                // 只有在未回答或在错题复习模式下且题目未被锁定时才允许点击
                if (!actualIsAnswered || (quizMode === 'review' && !lockedQuestions.includes(index))) {
                    optionClass += 'cursor-pointer ';
                } else {
                    optionClass += 'cursor-default ';
                }
                
                if (isDarkMode) {
                    let isReviewSubmitted = quizMode === 'review' && reviewSubmittedQuestions.includes(index);
                    if ((actualIsAnswered && quizMode !== 'review') || isReviewSubmitted) {
                        // 在练习模式下已回答或在错题复习模式下已提交
                        if (isCorrect) {
                            optionClass += 'bg-green-900 border-green-700 text-white';
                        } else if (isWrong) {
                            optionClass += 'bg-red-900 border-red-700 text-white';
                        } else {
                            optionClass += 'bg-gray-800 border-gray-700 text-white';
                        }
                    } else {
                        // 未回答或在错题复习模式下未提交
                        optionClass += isSelected ? 'bg-blue-900 border-blue-700 text-white' : 'bg-gray-800 border-gray-700 text-white';
                    }
                } else {
                    let isReviewSubmitted = quizMode === 'review' && reviewSubmittedQuestions.includes(index);
                    if ((actualIsAnswered && quizMode !== 'review') || isReviewSubmitted) {
                        // 在练习模式下已回答或在错题复习模式下已提交
                        if (isCorrect) {
                            optionClass += 'bg-success-light border-success';
                        } else if (isWrong) {
                            optionClass += 'bg-danger-light border-danger';
                        } else {
                            optionClass += 'bg-white border-gray-200';
                        }
                    } else {
                        // 未回答或在错题复习模式下未提交
                        optionClass += isSelected ? 'bg-primary-light border-primary' : 'bg-white border-gray-300';
                    }
                }

                let circleClass = '';
                if (isDarkMode) {
                    let isReviewSubmitted = quizMode === 'review' && reviewSubmittedQuestions.includes(index);
                    if ((actualIsAnswered && quizMode !== 'review') || isReviewSubmitted) {
                        // 在练习模式下已回答或在错题复习模式下已提交
                        circleClass = isCorrect ? 'bg-green-700 text-white' : isWrong ? 'bg-red-700 text-white' : 'bg-gray-700 text-gray-300';
                    } else {
                        // 未回答或在错题复习模式下未提交
                        circleClass = isSelected ? 'bg-primary text-white' : 'bg-gray-300 text-gray-700';
                    }
                } else {
                    let isReviewSubmitted = quizMode === 'review' && reviewSubmittedQuestions.includes(index);
                    if ((actualIsAnswered && quizMode !== 'review') || isReviewSubmitted) {
                        // 在练习模式下已回答或在错题复习模式下已提交
                        circleClass = isCorrect ? 'bg-success text-white' : isWrong ? 'bg-danger text-white' : 'bg-gray-200 text-gray-600';
                    } else {
                        // 未回答或在错题复习模式下未提交
                        circleClass = isSelected ? 'bg-primary text-white' : 'bg-gray-300 text-gray-700';
                    }
                }

                optionsHtml += `
                    <div class="${optionClass}" data-option="${option.letter}">
                        <div class="flex items-start">
                            <div class="flex-shrink-0 w-6 h-6 rounded-full flex items-center justify-center mr-3 mt-0.5 ${circleClass}">
                                ${option.letter}
                            </div>
                            <div class="flex-grow">
                                ${option.text}
                            </div>
                        </div>
                    </div>
                `;
            });

            return optionsHtml;
        }

        // 显示答案解析
        function showExplanation(question, userAnswer) {
            const isCorrect = userAnswer === question.答案;
            
            if (isDarkMode) {
                answerResult.className = `mb-4 p-4 rounded-md ${isCorrect ? 'bg-green-900 text-green-400 border border-green-700' : 'bg-red-900 text-red-400 border border-red-700'}`;
                explanationContainer.classList.add('bg-gray-800', 'text-white', 'border-gray-700');
            } else {
                answerResult.className = `mb-4 p-4 rounded-md ${isCorrect ? 'bg-success-light text-success' : 'bg-danger-light text-danger'}`;
                explanationContainer.classList.remove('bg-gray-800', 'text-white', 'border-gray-700');
            }
            
            answerResult.innerHTML = `
                <div class="flex items-center">
                    <i class="fa fa-${isCorrect ? 'check-circle' : 'times-circle'} mr-2"></i>
                    <span>
                        ${isCorrect ? t('correctAnswer') : t('wrongAnswer', { userAnswer, correctAnswer: question.答案 })}
                    </span>
                </div>
            `;
            
            explanationText.textContent = question.解析 || t('noExplanation');
            explanationContainer.classList.remove('hidden');
            
            // 动画效果
            gsap.from(explanationContainer, { opacity: 0, y: 20, duration: 0.5 });
        }

        // 更新按钮状态
        function updateButtonStates() {
            // 上一题按钮状态
            if (isRandomOrder) {
                // 乱序模式：基于已回答的题目数量
                prevBtn.disabled = answeredQuestions.length <= 1;
            } else {
                // 顺序模式：基于当前索引
                prevBtn.disabled = currentQuestionIndex === 0;
            }
            
            // 下一题按钮状态：基于未回答的题目数量
            nextBtn.disabled = unAnsweredQuestions.length === 0;
            
            prevBtn.classList.toggle('opacity-50', prevBtn.disabled);
            nextBtn.classList.toggle('opacity-50', nextBtn.disabled);
            
            let isAnswered;
            if (quizMode === 'review') {
                // 在错题复习模式下，检查是否在当前模式下提交过答案
                isAnswered = reviewSubmittedQuestions.includes(currentQuestionIndex);
            } else {
                isAnswered = userAnswers[currentQuestionIndex] !== null && userAnswers[currentQuestionIndex] !== 'skipped';
            }
            submitBtn.disabled = isAnswered;
            submitBtn.classList.toggle('opacity-50', submitBtn.disabled);
            
            if (isAnswered) {
                submitBtn.innerHTML = t('submitted');
            } else {
                submitBtn.innerHTML = `${t('submit')}<i class="fa fa-check ml-2"></i>`;
            }
        }

        // 更新统计信息
        function updateStats() {
            completionRateEl.textContent = `${Math.round((quizStats.completed / quizStats.total) * 100)}%`;
            completionBarEl.style.width = `${(quizStats.completed / quizStats.total) * 100}%`;
            
            correctCountEl.textContent = quizStats.correct;
            wrongCountEl.textContent = quizStats.wrong;
            collectedCountEl.textContent = quizStats.collected;
            skippedCountEl.textContent = quizStats.skipped;
        }

        // 渲染题目导航
        function renderQuestionNav() {
            questionNavEl.innerHTML = '';
            
            let totalQuestions;
            if (quizMode === 'review') {
                totalQuestions = questions.length;
            } else {
                totalQuestions = originalQuestions.length;
            }
            
            for (let i = 0; i < totalQuestions; i++) {
                let isAnswered;
                let isSkipped;
                let isCorrect;
                let isCurrent = i === currentQuestionIndex;
                let isCollected;
                
                if (quizMode === 'review') {
                    // 错题复习模式
                    isAnswered = userAnswers[i] !== null;
                    isSkipped = userAnswers[i] === 'skipped';
                    isCorrect = isAnswered && !isSkipped && userAnswers[i] === questions[i].答案;
                    const originalIndex = wrongIndexMap[i];
                    isCollected = collectedQuestions.includes(originalIndex);
                } else {
                    // 练习模式
                    isAnswered = userAnswers[i] !== null;
                    isSkipped = userAnswers[i] === 'skipped';
                    isCorrect = isAnswered && !isSkipped && userAnswers[i] === originalQuestions[i].答案;
                    isCollected = collectedQuestions.includes(i);
                }
                
                let btnClass = 'w-8 h-8 rounded-full flex items-center justify-center text-sm font-medium transition-all duration-300 ';
                
                if (isDarkMode) {
                    if (isCurrent) {
                        btnClass += 'ring-2 ring-offset-2 ring-blue-400 ';
                    }
                    
                    if (isAnswered) {
                        if (isSkipped) {
                            btnClass += 'bg-gray-600 text-white';
                        } else {
                            btnClass += isCorrect ? 'bg-green-700 text-white' : 'bg-red-700 text-white';
                        }
                    } else {
                        btnClass += 'bg-gray-700 text-white hover:bg-gray-600';
                    }
                } else {
                    if (isCurrent) {
                        btnClass += 'ring-2 ring-offset-2 ring-primary ';
                    }
                    
                    if (isAnswered) {
                        if (isSkipped) {
                            btnClass += 'bg-gray-400 text-white';
                        } else {
                            btnClass += isCorrect ? 'bg-success text-white' : 'bg-danger text-white';
                        }
                    } else {
                        btnClass += 'bg-gray-200 text-gray-700 hover:bg-gray-300';
                    }
                }
                
                const btn = document.createElement('button');
                btn.className = btnClass;
                btn.textContent = i + 1;
                
                if (isCollected) {
                    btn.innerHTML += '<i class="fa fa-star text-warning text-xs absolute"></i>';
                    btn.classList.add('relative');
                }
                
                btn.addEventListener('click', () => {
                    currentQuestionIndex = i;
                    showQuestion(currentQuestionIndex);
                    updateButtonStates();
                    renderQuestionNav(); // 重新渲染导航以更新当前题目标记
                });
                
                questionNavEl.appendChild(btn);
            }
        }

        // 提交答案
        function submitAnswer() {
            // 检查是否已经回答过且不在错题复习模式
            const isAnswered = userAnswers[currentQuestionIndex] !== null && userAnswers[currentQuestionIndex] !== 'skipped';
            if (isAnswered && quizMode !== 'review') {
                return; // 在练习模式下已经回答过的题目不允许重新提交
            }
            
            const selectedOptions = Array.from(questionContainer.querySelectorAll('.option-item.ring-2')).map(opt => opt.dataset.option);
            
            if (selectedOptions.length === 0) {
                alert(t('selectOption'));
                return;
            }
            
            // 对选项进行排序以确保顺序一致（针对多选题）
            const userAnswer = selectedOptions.sort().join('');
            
            let correctAnswer;
            let questionType;
            let originalIndex;
            
            if (quizMode === 'review') {
                // 错题复习模式
                correctAnswer = questions[currentQuestionIndex].答案;
                questionType = questions[currentQuestionIndex].类型;
                originalIndex = wrongIndexMap[currentQuestionIndex];
            } else {
                // 练习模式
                correctAnswer = originalQuestions[currentQuestionIndex].答案;
                questionType = originalQuestions[currentQuestionIndex].类型;
                originalIndex = currentQuestionIndex;
            }
            
            // 检查题目类型，如果答案长度大于1，即使类型是单选也视为多选
            if (questionType === '单选' && correctAnswer.length > 1) {
                questionType = '多选';
            }
            
            // 检查之前是否是跳过的题目
            const wasSkipped = userAnswers[currentQuestionIndex] === 'skipped';
            
            // 检查之前是否已经回答过
            const wasAnswered = userAnswers[currentQuestionIndex] !== null && userAnswers[currentQuestionIndex] !== 'skipped';
            
            // 保存之前的答案，用于错题复习模式下的统计更新
            const previousAnswer = userAnswers[currentQuestionIndex];
            
            userAnswers[currentQuestionIndex] = userAnswer;
            
            // 更新统计
            if (wasSkipped) {
                // 如果之前是跳过的题目，减少跳过计数
                quizStats.skipped--;
            } else if (!wasAnswered) {
                // 否则增加完成计数
                quizStats.completed++;
            } else if (quizMode === 'review') {
                // 在错题复习模式下重新回答，更新统计
                const wasCorrect = previousAnswer === correctAnswer;
                if (wasCorrect) {
                    quizStats.correct--;
                } else {
                    quizStats.wrong--;
                }
            }
            
            const isCorrect = userAnswer === correctAnswer;
            
            if (quizMode === 'review') {
                // 错题复习模式，标记当前题目为已提交
                if (!reviewSubmittedQuestions.includes(currentQuestionIndex)) {
                    reviewSubmittedQuestions.push(currentQuestionIndex);
                }
                
                if (isCorrect) {
                    // 选对了，先更新原始数据
                    if (originalState) {
                        originalState.userAnswers[originalIndex] = userAnswer;
                        // 更新原始统计
                        const wasWrong = originalState.userAnswers[originalIndex] !== originalQuestions[originalIndex].答案;
                        if (wasWrong) {
                            originalState.quizStats.wrong--;
                            originalState.quizStats.correct++;
                        }
                        
                        // 同步更新当前 quizStats 显示统计数据
                        quizStats = {...originalState.quizStats};
                        
                        // 立即保存到本地存储，确保刷新页面后数据不丢失
                        const progressData = {
                            currentQuestionIndex: originalState.currentQuestionIndex,
                            userAnswers: originalState.userAnswers,
                            quizStats: originalState.quizStats,
                            unAnsweredQuestions: unAnsweredQuestions,
                            answeredQuestions: answeredQuestions,
                            isRandomOrder: isRandomOrder,
                            currentQuizBankIndex: currentQuizBankIndex,
                            timestamp: Date.now()
                        };
                        localStorage.setItem('quizProgress', JSON.stringify(progressData));
                    }
                    
                    // 保存当前要移除的索引
                    const removedIndex = currentQuestionIndex;
                    
                    // 从错题列表中移除这道题
                    questions.splice(removedIndex, 1);
                    userAnswers.splice(removedIndex, 1);
                    wrongIndexMap.splice(removedIndex, 1);
                    
                    // 调整 reviewSubmittedQuestions 数组中大于 removedIndex 的索引
                    reviewSubmittedQuestions = reviewSubmittedQuestions
                        .filter(idx => idx !== removedIndex)
                        .map(idx => idx > removedIndex ? idx - 1 : idx);
                    
                    // 调整 lockedQuestions 数组中大于 removedIndex 的索引
                    lockedQuestions = lockedQuestions
                        .filter(idx => idx !== removedIndex)
                        .map(idx => idx > removedIndex ? idx - 1 : idx);
                    
                    // 更新进度统计显示
                    updateStats();
                    
                    // 检查是否还有错题
                    if (questions.length === 0) {
                        // 没有错题了，显示提示信息
                        showNoWrongAnswersMessage();
                        return;
                    } else {
                        // 还有错题，调整当前索引
                        if (currentQuestionIndex >= questions.length) {
                            currentQuestionIndex = questions.length - 1;
                        }
                        quizStats.total = questions.length;
                    }
                } else {
                    // 在错题复习模式下又选错了，锁定这道题
                    if (!lockedQuestions.includes(currentQuestionIndex)) {
                        lockedQuestions.push(currentQuestionIndex);
                    }
                    quizStats.wrong++;
                }
            } else {
                // 练习模式
                if (isCorrect) {
                    quizStats.correct++;
                } else {
                    quizStats.wrong++;
                }
            }
            
            updateStats();
            if (quizMode !== 'review' || questions.length > 0) {
                showQuestion(currentQuestionIndex);
            }
            updateButtonStates();
            renderQuestionNav();
            
            // 保存到本地存储（只在练习模式下保存）
            if (quizMode !== 'review') {
                saveProgress();
            }
            
            // 从unAnsweredQuestions数组中移除当前题目索引（只在练习模式下）
            if (quizMode !== 'review') {
                const currentIndex = unAnsweredQuestions.indexOf(currentQuestionIndex);
                if (currentIndex > -1) {
                    unAnsweredQuestions.splice(currentIndex, 1);
                }
                
                // 功能优化：当选对了（只有多选题无论对错都要点“提交答案”）的时候，直接跳转到下一题
                if (isCorrect && questionType !== '多选') {
                    if (unAnsweredQuestions.length > 0) {
                        // 跳转到下一题
                        let nextIndex;
                        if (isRandomOrder) {
                            // 乱序模式：从未做的题目中随机选择一个
                            const randomIndex = Math.floor(Math.random() * unAnsweredQuestions.length);
                            nextIndex = unAnsweredQuestions[randomIndex];
                        } else {
                            // 顺序模式：按顺序选择下一个
                            nextIndex = currentQuestionIndex + 1;
                            if (nextIndex >= originalQuestions.length) {
                                nextIndex = originalQuestions.length - 1;
                            }
                        }
                        showQuestion(nextIndex);
                    }
                }
            }
        }

        // 切换收藏状态
        function toggleCollect() {
            const index = currentQuestionIndex;
            const isCollected = collectedQuestions.includes(index);
            
            if (isCollected) {
                collectedQuestions = collectedQuestions.filter(i => i !== index);
                quizStats.collected--;
            } else {
                collectedQuestions.push(index);
                quizStats.collected++;
            }
            
            updateStats();
            renderQuestionNav();
            showQuestion(currentQuestionIndex); // 更新收藏按钮状态
            
            // 保存到本地存储
            localStorage.setItem('collectedQuestions', JSON.stringify(collectedQuestions));
            saveProgress();
        }

        // 跳过当前题目
        function skipQuestion() {
            if (userAnswers[currentQuestionIndex] === null) {
                userAnswers[currentQuestionIndex] = 'skipped';
                quizStats.skipped++;
                updateStats();
                saveProgress();
            }
            
            // 从unAnsweredQuestions数组中移除当前题目索引
            const currentIndex = unAnsweredQuestions.indexOf(currentQuestionIndex);
            if (currentIndex > -1) {
                unAnsweredQuestions.splice(currentIndex, 1);
            }
            
            // 移动到下一题
            if (unAnsweredQuestions.length > 0) {
                let nextIndex;
                if (isRandomOrder) {
                    // 乱序模式：从未做的题目中随机选择一个
                    const randomIndex = Math.floor(Math.random() * unAnsweredQuestions.length);
                    nextIndex = unAnsweredQuestions[randomIndex];
                } else {
                    // 顺序模式：按顺序选择下一个
                    nextIndex = currentQuestionIndex + 1;
                    if (nextIndex >= originalQuestions.length) {
                        nextIndex = originalQuestions.length - 1;
                    }
                }
                showQuestion(nextIndex);
                updateButtonStates();
                renderQuestionNav();
            }
        }

        // 保存进度到本地存储
        function saveProgress() {
            // 只有在非错题复习模式下才保存进度
            if (quizMode !== 'review') {
                const progressData = {
                    currentQuestionIndex: currentQuestionIndex,
                    userAnswers: userAnswers,
                    quizStats: quizStats,
                    unAnsweredQuestions: unAnsweredQuestions,
                    answeredQuestions: answeredQuestions,
                    isRandomOrder: isRandomOrder,
                    currentQuizBankIndex: currentQuizBankIndex,
                    // 添加时间戳，用于判断进度是否过期
                    timestamp: Date.now()
                };
                localStorage.setItem('quizProgress', JSON.stringify(progressData));
            }
        }
        
        // 重置题库进度
        function resetProgress(bankIndex) {
            if (confirm('确定要重置这个题库的进度吗？这将清除所有已回答的记录。')) {
                // 清除本地存储中的进度数据
                localStorage.removeItem('quizProgress');
                localStorage.removeItem('userAnswers');
                localStorage.removeItem('quizStats');
                
                // 显示重置成功提示
                alert('进度已重置');
                
                // 重新渲染题库列表
                showQuizBankList();
            }
        }
        
        // 加载题库列表
        function loadQuizBanks() {
            const savedBanks = localStorage.getItem('quizBanks');
            if (savedBanks) {
                quizBanks = JSON.parse(savedBanks);
            } else {
                // 默认添加本地题库
                quizBanks = [{
                    id: 'default',
                    name: '本地默认题库',
                    source: 'local'
                }];
                saveQuizBanks();
            }
        }
        
        // 保存题库列表
        function saveQuizBanks() {
            localStorage.setItem('quizBanks', JSON.stringify(quizBanks));
        }
        
        // 添加新题库
        function addQuizBank(quizData, fileName) {
            const newBank = {
                id: Date.now().toString(),
                name: quizData.name || fileName.replace('.json', ''),
                source: 'uploaded',
                questions: quizData.questions
            };
            quizBanks.push(newBank);
            saveQuizBanks();
            return newBank;
        }
        
        // 删除题库
        function deleteQuizBank(bankId) {
            quizBanks = quizBanks.filter(bank => bank.id !== bankId);
            saveQuizBanks();
        }
        
        // 切换到指定题库
        function switchToQuizBank(bankIndex) {
            if (bankIndex < 0 || bankIndex >= quizBanks.length) return;
            
            currentQuizBankIndex = bankIndex;
            const selectedBank = quizBanks[bankIndex];
            
            if (selectedBank.source === 'local') {
                // 加载本地默认题库
                init();
            } else {
                // 使用上传的题库
                originalQuestions = selectedBank.questions; // 保存原始顺序
                // 根据设置决定是否打乱顺序
                questions = isRandomOrder ? shuffleArray([...originalQuestions]) : [...originalQuestions];
                initializeQuiz();
            }
            
            // 直接切换标签样式，避免重复调用initializeQuiz
            [practiceTab, reviewTab, customTab, editTab].forEach(tab => {
                tab.classList.remove('tab-active', 'tab-active-dark');
                tab.classList.add('tab-inactive');
                if (isDarkMode) {
                    tab.classList.add('tab-inactive-dark');
                }
            });
            practiceTab.classList.remove('tab-inactive', 'tab-inactive-dark');
            practiceTab.classList.add('tab-active');
            if (isDarkMode) {
                practiceTab.classList.add('tab-active-dark');
            }
            quizMode = 'random';
        }
        
        // 导出题库
        function exportQuizBank(bankIndex) {
            if (bankIndex < 0 || bankIndex >= quizBanks.length) return;
            
            const selectedBank = quizBanks[bankIndex];
            const quizData = {
                name: selectedBank.name,
                source: selectedBank.source,
                questions: selectedBank.source === 'local' ? originalQuestions : (selectedBank.questions || [])
            };
            
            // 将题库数据转换为JSON字符串
            const jsonString = JSON.stringify(quizData, null, 2);
            
            // 保存当前导出的题库信息
            currentExportBank = {
                name: selectedBank.name,
                jsonString: jsonString
            };
            
            // 填充模态框内容
            document.getElementById('export-modal-title').textContent = `${t('exportBank')}: ${selectedBank.name}`;
            document.getElementById('export-json-content').value = jsonString;
            
            // 显示模态框
            document.getElementById('export-modal').classList.remove('hidden');
        }
        
        // 关闭导出模态框
        function closeExportModal() {
            document.getElementById('export-modal').classList.add('hidden');
        }
        
        // 复制JSON内容
        function copyJsonContent() {
            const jsonContent = document.getElementById('export-json-content');
            jsonContent.select();
            document.execCommand('copy');
            
            // 显示复制成功提示
            const copyButton = document.getElementById('copy-json');
            const originalText = copyButton.textContent;
            copyButton.textContent = '已复制';
            setTimeout(() => {
                copyButton.textContent = originalText;
            }, 1500);
        }
        
        // 下载JSON文件
        function downloadJsonFile() {
            if (!currentExportBank) return;
            
            const { name, jsonString } = currentExportBank;
            
            // 创建Blob对象
            const blob = new Blob([jsonString], { type: 'application/json' });
            
            // 创建下载链接
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `${name}.json`;
            
            // 触发下载
            document.body.appendChild(a);
            a.click();
            
            // 清理
            setTimeout(() => {
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
            }, 100);
        }

        // 加载进度从本地存储
        function loadProgress() {
            const savedAnswers = localStorage.getItem('userAnswers');
            const savedStats = localStorage.getItem('quizStats');
            
            if (savedAnswers) {
                userAnswers = JSON.parse(savedAnswers);
            }
            
            if (savedStats) {
                quizStats = JSON.parse(savedStats);
            }
        }

        // 切换标签
        function switchTab(tabName) {
            // 重置所有标签样式
            [practiceTab, reviewTab, customTab, editTab].forEach(tab => {
                tab.classList.remove('tab-active', 'tab-active-dark');
                tab.classList.add('tab-inactive');
                if (isDarkMode) {
                    tab.classList.add('tab-inactive-dark');
                }
            });
            
            // 设置选中标签样式
            const activeTab = document.getElementById(`${tabName}-tab`);
            activeTab.classList.remove('tab-inactive', 'tab-inactive-dark');
            activeTab.classList.add('tab-active');
            if (isDarkMode) {
                activeTab.classList.add('tab-active-dark');
            }
            
            // 根据标签切换模式
            switch (tabName) {
                case 'practice':
                    quizMode = 'random';
                    // 检查是否已经有选中的题库
                    if (currentQuizBankIndex >= 0 && currentQuizBankIndex < quizBanks.length) {
                        const selectedBank = quizBanks[currentQuizBankIndex];
                        if (selectedBank.source === 'local') {
                            // 加载本地默认题库
                            init();
                        } else {
                            // 使用已选中的上传题库
                            originalQuestions = selectedBank.questions; // 保存原始顺序
                            // 根据设置决定是否打乱顺序
                            questions = isRandomOrder ? shuffleArray([...originalQuestions]) : [...originalQuestions];
                            initializeQuiz();
                        }
                    } else {
                        // 重新初始化随机练习
                        init();
                    }
                    break;
                case 'review':
                    quizMode = 'review';
                    // 加载错题集
                    loadReviewMode();
                    break;
                case 'custom':
                    quizMode = 'custom';
                    // 显示题库列表

                case 'edit':

        // 保存原始状态

        // 保存锁定的题目索引
        let lockedQuestions = [];
        // 保存错题索引映射
        let wrongIndexMap = [];
        // 保存在错题复习模式下已经提交过答案的题目索引
        let reviewSubmittedQuestions = [];
        
        // 显示没有错题的提示信息
        function showNoWrongAnswersMessage() {
            const textColor = isDarkMode ? 'text-white' : 'text-gray-700';
            
            questionContainer.innerHTML = `
                <div class="text-center py-8">

            `;
            const backBtn = document.getElementById('back-to-practice');

                backBtn.addEventListener('click', () => switchTab('practice'));
            }
