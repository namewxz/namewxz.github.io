        function loadReviewMode() {
            // 重置锁定的题目数组
            lockedQuestions = [];
            // 重置错题索引映射
            wrongIndexMap = [];
            // 重置已提交答案的题目数组
            reviewSubmittedQuestions = [];
            
            const wrongQuestions = [];
            const wrongIndices = [];
            
            // 找出所有答错的题目
            userAnswers.forEach((answer, index) => {
                if (answer !== null && answer !== 'skipped' && answer !== originalQuestions[index].答案) {
                    wrongQuestions.push(originalQuestions[index]);
                    wrongIndices.push(index);
                    // 建立错题索引映射
                    wrongIndexMap.push(index);
                }
            });
            
            if (wrongQuestions.length === 0) {
                showNoWrongAnswersMessage();
                return;
            }
            
            // 保存原始状态
            originalState = {
                questions: [...questions],
                userAnswers: [...userAnswers],
                quizStats: {...quizStats},
                currentQuestionIndex: currentQuestionIndex
            };
            
            // 使用错题集
            questions = wrongQuestions;
            
            // 创建错题专用的用户答案数组，保留原始答案
            const reviewUserAnswers = new Array(wrongQuestions.length).fill(null);
            wrongIndices.forEach((originalIndex, i) => {
                reviewUserAnswers[i] = userAnswers[originalIndex];
            });
            
            // 重置状态
            currentQuestionIndex = 0;
            userAnswers = reviewUserAnswers;
            quizStats = {
                total: wrongQuestions.length,
                completed: 0,
                correct: 0,
                wrong: 0,
                collected: collectedQuestions.filter(i => wrongIndices.includes(i)).length,
                skipped: 0
            };
            
            // 更新UI
            updateStats();
            renderQuestionNav();
            showQuestion(currentQuestionIndex);
            updateButtonStates();
            
            // 更新题数显示
            questionCountEl.textContent = `${t('wrongQuestions')}: ${wrongQuestions.length}`;
            currentQuestionIndexEl.textContent = `${t('currentQuestion')}: ${currentQuestionIndex + 1}/${wrongQuestions.length}`;
            
            // 添加返回按钮
            const backButton = document.createElement('button');
            backButton.className = 'btn-secondary absolute top-4 right-4';
            backButton.innerHTML = `<i class="fa fa-arrow-left mr-2"></i>${t('backToPractice')}`;
            backButton.addEventListener('click', () => {
                // 恢复原始状态
                if (originalState) {
                    // 将错题复习模式下剩余题目的答题结果保存到原始userAnswers数组
                    userAnswers.forEach((answer, i) => {
                        if (i < wrongIndexMap.length && answer !== null) {
                            const originalIndex = wrongIndexMap[i];
                            originalState.userAnswers[originalIndex] = answer;
                        }
                    });
                    
                    questions = originalState.questions;
                    userAnswers = originalState.userAnswers;
                    quizStats = originalState.quizStats;
                    currentQuestionIndex = originalState.currentQuestionIndex;
                    originalState = null;
                    
                    // 保存进度到本地存储
                    saveProgress();
                }
                switchTab('practice');
            });
            
            questionContainer.style.position = 'relative';
            questionContainer.appendChild(backButton);
        }

        // 导入自定义题库
        function importCustomQuiz(file) {
            const reader = new FileReader();
            
            reader.onload = function(e) {
                try {
                    const data = JSON.parse(e.target.result);
                    
                    if (!data.questions || !Array.isArray(data.questions)) {
                        throw new Error(t('invalidFormat'));
                    }
                    
                    // 验证题目格式
                    for (let i = 0; i < data.questions.length; i++) {
                        const q = data.questions[i];
                        if (!q.题干 || !q.类型 || !q.答案) {
                            throw new Error(t('missingFields', { index: i + 1 }));
                        }
                    }
                    
                    // 添加到题库列表
                    addQuizBank(data, file.name);
                    
                    // 关闭模态框
                    uploadModal.classList.add('hidden');
                    
                    // 显示成功消息
                    alert(t('importSuccess', { count: data.questions.length }));
                    
                    // 重新显示题库列表
                    showQuizBankList();
                    
                } catch (error) {
                    alert(t('importFailed', { error: error.message }));
                }
            };
            
            reader.onerror = function() {
                alert(t('fileReadError'));
            };
            
            reader.readAsText(file);
        }

        // 事件监听器
        function setupEventListeners() {
            // 语言切换按钮
            document.getElementById('language-toggle').addEventListener('click', toggleLanguage);
            
            // 暗黑模式切换按钮
            document.getElementById('theme-toggle').addEventListener('click', toggleDarkMode);
            
            // 导航按钮
            prevBtn.addEventListener('click', () => {
                isSwiping = false; // 重置滑动标志
                if (quizMode === 'review') {
                    // 错题复习模式：按顺序返回上一题
                    if (currentQuestionIndex > 0) {
                        currentQuestionIndex--;
                        showQuestion(currentQuestionIndex);
                        saveProgress();
                    }
                } else {
                    // 练习模式：使用导航历史
                    if (historyIndex > 0) {
                        historyIndex--;
                        const prevIndex = navigationHistory[historyIndex];
                        showQuestion(prevIndex);
                        saveProgress();
                    }
                }
            });
            
            nextBtn.addEventListener('click', () => {
                if (quizMode === 'review') {
                    // 错题复习模式：按顺序前进到下一题
                    if (currentQuestionIndex < questions.length - 1) {
                        currentQuestionIndex++;
                        showQuestion(currentQuestionIndex);
                        saveProgress();
                    }
                } else if (unAnsweredQuestions.length > 0 || historyIndex < navigationHistory.length - 1) {
                    isSwiping = false; // 重置滑动标志
                    if (historyIndex < navigationHistory.length - 1) {
                        // 有历史记录可以前进
                        historyIndex++;
                        const nextIndex = navigationHistory[historyIndex];
                        showQuestion(nextIndex);
                        saveProgress();
                    } else {
                        // 没有历史记录，需要选择新题目
                        let nextIndex;
                        if (isRandomOrder) {
                            // 乱序模式：从未做的题目中随机选择一个
                            const randomIndex = Math.floor(Math.random() * unAnsweredQuestions.length);
                            nextIndex = unAnsweredQuestions[randomIndex];
                            // 从unAnsweredQuestions数组中移除选中的题目
                            unAnsweredQuestions.splice(randomIndex, 1);
                        } else {
                            // 顺序模式：按顺序选择下一个
                            nextIndex = currentQuestionIndex + 1;
                            if (nextIndex >= originalQuestions.length) {
                                nextIndex = originalQuestions.length - 1;
                            }
                            // 从unAnsweredQuestions数组中移除选中的题目
                            const indexInUnanswered = unAnsweredQuestions.indexOf(nextIndex);
                            if (indexInUnanswered > -1) {
                                unAnsweredQuestions.splice(indexInUnanswered, 1);
                            }
                        }
                        showQuestion(nextIndex);
                        saveProgress();
                    }
                }
            });
            
            // 提交按钮
            submitBtn.addEventListener('click', submitAnswer);
            
            // 收藏按钮
            collectBtn.addEventListener('click', toggleCollect);

            editTab.addEventListener('click', () => switchTab('edit'));
            
            // 模态框按钮

                    uploadModal.classList.add('hidden');
                }
            });
            
            // 键盘快捷键
            document.addEventListener('keydown', (e) => {
                if (e.key === 'ArrowLeft') {
                    prevBtn.click();
                } else if (e.key === 'ArrowRight') {
                    nextBtn.click();

                            text.classList.add('text-gray-700');
                        }
                    }
                });
            }
            
            // 模态框
            const modal = document.getElementById('upload-modal');
            if (modal) {
                const modalContent = modal.querySelector('div');
                if (modalContent) {
                    modalContent.classList.toggle('bg-gray-800', isDarkMode);
                    modalContent.classList.toggle('text-white', isDarkMode);
                    modalContent.classList.toggle('border-gray-700', isDarkMode);
                    
                    // 调整模态框内的文本颜色
                    const modalTexts = modalContent.querySelectorAll('h3, p, label');
                    modalTexts.forEach(text => {
                        if (isDarkMode) {
                            text.classList.add('text-white');
                            text.classList.remove('text-gray-800', 'text-gray-700', 'text-gray-500');
                        } else {
                            text.classList.remove('text-white');
                            if (text.tagName === 'H3') {
                                text.classList.add('text-gray-800');
                            } else if (text.tagName === 'P') {
                                text.classList.add('text-gray-700');
                            } else if (text.tagName === 'LABEL') {
                                text.classList.add('text-gray-500');
                            }
                        }
                    });
                }
            }
            
            // 更新UI
            updateUI();
            
            // 根据当前模式重新渲染页面内容
            if (quizMode === 'custom' || quizMode === 'edit') {
                // 导题练习或编辑模式，重新渲染题库列表
                showQuizBankList();
            } else if (quizMode === 'review') {
                // 错题复习模式，重新渲染错题列表
                reviewMistakes();
            } else if (quizMode === 'random' && originalQuestions.length > 0) {
                // 练习模式，重新渲染题目和导航
                renderQuestionNav();
                showQuestion(currentQuestionIndex);
            } else if (quizMode === 'random') {
                // 练习模式，重新渲染题目和导航
                renderQuestionNav();
                showQuestion(currentQuestionIndex);
            }
            
            // 重新渲染题目导航（无论当前是什么模式）
            renderQuestionNav();
            
            // 重新应用暗黑模式样式
            setTimeout(() => {
                // 按钮样式
                const buttons = document.querySelectorAll('button');
                buttons.forEach(button => {
                    if (button.classList.contains('btn-primary')) {
                        if (isDarkMode) {
                            button.classList.add('bg-blue-600', 'hover:bg-blue-700');
                            button.classList.remove('bg-primary', 'hover:bg-blue-600');
                        } else {
                            button.classList.remove('bg-blue-600', 'hover:bg-blue-700');
                            button.classList.add('bg-primary', 'hover:bg-blue-600');
                        }
                    } else if (button.classList.contains('btn-secondary')) {
                        if (isDarkMode) {
                            button.classList.add('bg-gray-700', 'text-white', 'hover:bg-gray-600');
                            button.classList.remove('bg-gray-200', 'text-gray-800', 'hover:bg-gray-300');
                        } else {
                            button.classList.remove('bg-gray-700', 'text-white', 'hover:bg-gray-600');
                            button.classList.add('bg-gray-200', 'text-gray-800', 'hover:bg-gray-300');
                        }
                    } else if (button.classList.contains('btn-success')) {
                        if (isDarkMode) {
                            button.classList.add('bg-green-700', 'hover:bg-green-800');
                            button.classList.remove('bg-success', 'hover:bg-green-600');
                        } else {
                            button.classList.remove('bg-green-700', 'hover:bg-green-800');
                            button.classList.add('bg-success', 'hover:bg-green-600');
                        }
                    } else if (button.classList.contains('btn-danger')) {
                        if (isDarkMode) {
                            button.classList.add('bg-red-700', 'hover:bg-red-800');
                            button.classList.remove('bg-danger', 'hover:bg-red-600');
                        } else {
                            button.classList.remove('bg-red-700', 'hover:bg-red-800');
                            button.classList.add('bg-danger', 'hover:bg-red-600');
                        }
                    }
                });
                
                // 语言和主题切换按钮
                const languageToggle = document.getElementById('language-toggle');
                const themeToggle = document.getElementById('theme-toggle');
                if (languageToggle) {
                    if (isDarkMode) {
                        languageToggle.classList.add('bg-gray-700', 'text-white');
                        languageToggle.classList.remove('bg-gray-200', 'text-gray-800');
                    } else {
                        languageToggle.classList.remove('bg-gray-700', 'text-white');
                        languageToggle.classList.add('bg-gray-200', 'text-gray-800');
                    }
                }
                if (themeToggle) {
                    if (isDarkMode) {
                        themeToggle.classList.add('bg-gray-700', 'text-white');
                        themeToggle.classList.remove('bg-gray-200', 'text-gray-800');
                    } else {
                        themeToggle.classList.remove('bg-gray-700', 'text-white');
                        themeToggle.classList.add('bg-gray-200', 'text-gray-800');
                    }
                }
            }, 100);
        }

        // 更新UI文本
        function updateUI() {
            // 更新标题
            const appTitle = document.getElementById('app-title');
            if (appTitle) {
                appTitle.textContent = t('appTitle');
            }
            
            // 更新标签
            function getMobileText(text) {
                // 如果是英文且包含空格，返回第一个单词
                if (currentLanguage === 'en' && text.includes(' ')) {
                    return text.split(' ')[0];
                }
                // 否则返回前两个字符
                return text.length > 2 ? text.substring(0, 2) : text;
            }
            
            const practiceTab = document.getElementById('practice-tab');
            if (practiceTab) {
                practiceTab.innerHTML = `
                    <span class="block md:hidden">${getMobileText(t('practice'))}</span>
                    <span class="hidden md:block">${t('practice')}</span>
                `;
                // 保持标签样式
                if (practiceTab.classList.contains('tab-active')) {
                    if (isDarkMode) {
                        practiceTab.classList.add('tab-active-dark');
                    }
                } else {
                    if (isDarkMode) {
                        practiceTab.classList.add('tab-inactive-dark');
                    }
                }
            }
            const reviewTab = document.getElementById('review-tab');
            if (reviewTab) {
                reviewTab.innerHTML = `
                    <span class="block md:hidden">${getMobileText(t('review'))}</span>
                    <span class="hidden md:block">${t('review')}</span>
                `;
                // 保持标签样式
                if (reviewTab.classList.contains('tab-active')) {
                    if (isDarkMode) {
                        reviewTab.classList.add('tab-active-dark');
                    }
                } else {
                    if (isDarkMode) {
                        reviewTab.classList.add('tab-inactive-dark');
                    }
                }
            }
            const customTab = document.getElementById('custom-tab');
            if (customTab) {
                customTab.innerHTML = `
                    <span class="block md:hidden">${getMobileText(t('custom'))}</span>
                    <span class="hidden md:block">${t('custom')}</span>
                `;
                // 保持标签样式
                if (customTab.classList.contains('tab-active')) {
                    if (isDarkMode) {
                        customTab.classList.add('tab-active-dark');
                    }
                } else {
                    if (isDarkMode) {
                        customTab.classList.add('tab-inactive-dark');
                    }
                }
            }
            const editTab = document.getElementById('edit-tab');
            if (editTab) {
                editTab.innerHTML = `
                    <span class="block md:hidden">${getMobileText(t('edit'))}</span>
                    <span class="hidden md:block">${t('edit')}</span>
                `;
                // 保持标签样式
                if (editTab.classList.contains('tab-active')) {
                    if (isDarkMode) {
                        editTab.classList.add('tab-active-dark');
                    }
                } else {
                    if (isDarkMode) {
                        editTab.classList.add('tab-inactive-dark');
                    }
                }
            }
            
            // 更新按钮、顺序/乱序按钮、统计信息和题目导航
            collectBtn.innerHTML = collectedQuestions.includes(currentQuestionIndex) 
                ? `<i class="fa fa-star mr-2 text-warning"></i>${t('collected')}` 
                : `<i class="fa fa-star-o mr-2"></i>${t('collect')}`;
            skipBtn.innerHTML = `<i class="fa fa-forward mr-2"></i>${t('skip')}`;
            submitBtn.innerHTML = userAnswers[currentQuestionIndex] !== null ? t('submitted') : `${t('submit')}<i class="fa fa-check ml-2"></i>`;
            prevBtn.innerHTML = `<i class="fa fa-arrow-left mr-2"></i>${t('prev')}`;
            nextBtn.innerHTML = `<i class="fa fa-arrow-right mr-2"></i>${t('next')}`;
            
            updateOrderButton();
            
            // 仅在练习模式下更新统计信息和题目导航
            if (quizMode === 'random') {
                document.getElementById('question-count').textContent = `${t('totalQuestions')}: ${originalQuestions.length}`;
                document.getElementById('current-question-index').textContent = `${t('currentQuestion')}: ${currentQuestionIndex + 1}/${originalQuestions.length}`;
                renderQuestionNav();
                showQuestion(currentQuestionIndex);
            }
            
            // 更新进度统计和题目导航的文本
            document.getElementById('progress-title').textContent = t('progress');
            document.getElementById('completion-rate-label').textContent = t('completionRate');
            document.getElementById('correct-label').textContent = t('correct');
            document.getElementById('wrong-label').textContent = t('wrong');
            document.getElementById('collected-label').textContent = t('collected');
            document.getElementById('skipped-label').textContent = t('skipped');
            document.getElementById('question-nav-title').textContent = t('questionNav');
            
            // 更新导入题库模态框的文本
            document.getElementById('upload-modal-title').textContent = t('importQuiz');
            document.getElementById('file-input-label').textContent = t('selectJson');
            document.getElementById('file-format-hint').textContent = t('fileReadError');
            document.getElementById('cancel-upload').textContent = t('cancel');
            document.getElementById('confirm-upload').textContent = t('confirm');
            
            // 更新导出题库模态框的文本
            document.getElementById('copy-json').textContent = t('copy');
            document.getElementById('download-json').textContent = t('download');
            document.getElementById('close-export').textContent = t('close');
            
            // 更新语言和主题切换按钮
            const languageText = document.getElementById('language-text');
            if (languageText) {
                if (currentLanguage === 'zh') {
                    languageText.textContent = '中文';
                } else if (currentLanguage === 'en') {
                    languageText.textContent = 'English';
                } else {
                    // 对于其他语言，显示语言代码或名称
                    const languageNames = {
                        'ru': 'Русский',
                        'fr': 'Français',
                        'pt': 'Português',
                        'es': 'Español',
                        'ar': 'العربية',
                        'ko': '한국어',
                        'ja': '日本語'
                    };
                    languageText.textContent = languageNames[currentLanguage] || currentLanguage;
                }
            }
            
            document.getElementById('theme-text').textContent = isDarkMode ? t('lightMode') : t('darkMode');
            document.getElementById('theme-toggle').innerHTML = isDarkMode ? `<i class="fa fa-sun-o"></i><span id="theme-text" class="hidden md:inline ml-2">${t('lightMode')}</span>` : `<i class="fa fa-moon-o"></i><span id="theme-text" class="hidden md:inline ml-2">${t('darkMode')}</span>`;
            
            // 更新语言下拉菜单的暗黑模式样式
            const languageDropdown = document.getElementById('language-dropdown');
            if (languageDropdown) {
                if (isDarkMode) {
                    languageDropdown.classList.add('bg-gray-800', 'text-white');
                    languageDropdown.classList.remove('bg-white');
                    
                    const languageOptions = languageDropdown.querySelectorAll('.language-option');
                    languageOptions.forEach(option => {
                        option.classList.add('text-white', 'hover:bg-gray-700');
                        option.classList.remove('hover:bg-gray-100');
                    });
                } else {
                    languageDropdown.classList.remove('bg-gray-800', 'text-white');
                    languageDropdown.classList.add('bg-white');
                    
                    const languageOptions = languageDropdown.querySelectorAll('.language-option');
                    languageOptions.forEach(option => {
                        option.classList.remove('text-white', 'hover:bg-gray-700');
                        option.classList.add('hover:bg-gray-100');
                    });
                }
            }
        }

        // 启动应用
        function startApp() {
            setupEventListeners();
            loadProgress();
            loadQuizBanks(); // 加载题库列表
            init();
        }

        // 页面加载完成后启动应用
        document.addEventListener('DOMContentLoaded', startApp);
    </script>

</body></html>
